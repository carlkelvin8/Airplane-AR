          /* ===== D-PAD STYLES ===== */
    .dpad {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: clamp(96px, 28vw, 160px);
      height: clamp(96px, 28vw, 160px);
      z-index: 2000;
      touch-action: none;
    }

    .dpad-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      width: 100%;
      height: 100%;
    }

    .dpad-btn { place-self:center; width:100%; height:100%; border:none; background:transparent; z-index:1 }
    .dpad-cross { position:relative; pointer-events:none; z-index:0 }
    .dpad-cross::before {
      content:""; position:absolute; top:0; left:0; right:0; bottom:0;
      background:#bab4aa;
      clip-path: polygon(
        0% 35%, 35% 35%, 35% 0%, 65% 0%, 65% 35%, 100% 35%,
        100% 65%, 65% 65%, 65% 100%, 35% 100%, 35% 65%, 0% 65%
      );
      border-radius:5px;
    }
    .dpad-cross::after {
      content:""; position:absolute; top:4px; left:4px; right:4px; bottom:4px;
      background: linear-gradient(#3a4055, #202636);
      clip-path: polygon(
        0% 35%, 35% 35%, 35% 0%, 65% 0%, 65% 35%, 100% 35%,
        100% 65%, 65% 65%, 65% 100%, 35% 100%, 35% 65%, 0% 65%
      );
      border-radius:5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35) inset;
    }
    .dpad-center { place-self:center; width:26%; height:26%; border-radius:999px; background:#171c29; box-shadow:0 5px 0 0 #070a13 inset; grid-column:2; grid-row:2; pointer-events:none; position:relative }
    .dpad-center::after { content:""; position:absolute; left:50%; bottom:14%; transform:translateX(-50%); width:40%; height:22%; border-radius:50%; background:#3a4055 }

.control-btn {
  width: clamp(38px, 9vw, 44px);
  height: clamp(38px, 9vw, 44px);
  border-radius: 50%;

  color: white;
  font-size: 18px;
  display: grid;
  place-items: center;
  cursor: pointer;
}

  /* ===== MENU BUTTON ===== */
  .menu-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #2b2b2b, #111);
    box-shadow:
      inset 2px 2px 4px rgba(255,255,255,0.15),
      inset -2px -2px 4px rgba(0,0,0,0.6),
      0 4px 10px rgba(0,0,0,0.5);
    display: grid;
    place-items: center;
    z-index: 2100;
    cursor: pointer;
  }

  /* Hamburger */
  .menu-bars {
    width: 22px;
    height: 16px;
    display: grid;
    gap: 4px;
  }

  .menu-bar {
    height: 2px;
    background: rgba(255,255,255,0.9);
    border-radius: 2px;
    transition: 0.3s ease;
  }

  /* Animate to X */
  .menu-btn.active .menu-bar:nth-child(1) {
    transform: translateY(6px) rotate(45deg);
  }
  .menu-btn.active .menu-bar:nth-child(2) {
    opacity: 0;
  }
  .menu-btn.active .menu-bar:nth-child(3) {
    transform: translateY(-6px) rotate(-45deg);
  }

  /* ===== DROPDOWN MENU ===== */
.menu-dropdown {
  position: fixed;
  top: 70px;
  right: 16px;
  min-width: 200px;
  background: rgba(20,20,20,0.97);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 6px;
  z-index: 99999;

  opacity: 0;
  transform: translateY(-10px) scale(0.98);
  visibility: hidden;
  transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s;
}

.menu-dropdown.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  visibility: visible;
}

.menu-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

.menu-item:hover {
  background: rgba(255,255,255,0.08);
}

function rotateStep(dx, dy) {
  if (!activeObject) return;
  const yaw = 0.04;
  const pitch = 0.04;
  activeObject.rotation.y += dx * yaw;
  activeObject.rotation.x += dy * pitch;
}

let holdTimerRotate = null;

function onHoldRotate(fn) {
  fn();
  holdTimerRotate = setInterval(fn, 60);
}

function endHoldRotate() {
  if (holdTimerRotate) {
    clearInterval(holdTimerRotate);
    holdTimerRotate = null;
  }
}

rotatePad.up.addEventListener("pointerdown", () =>
  onHoldRotate(() => rotateStep(0, 1))
);

  onHoldRotate(() => rotateStep(0, -1))
);

  onHoldRotate(() => rotateStep(-1, 0))
);

  onHoldRotate(() => rotateStep(1, 0))
);

  btn.addEventListener("pointercancel", endHoldRotate);
});

// ================= MOVEMENT CONTROLLER (RIGHT) =================
const movePad = createDpad("right");

let holdTimerMove = null;

function moveActive(dx, dy) {
  if (!activeObject) return;

  const step = 0.15;

  if (!anchorBase) {
    anchorBase = activeObject.position.clone();
  }

  const px = activeObject.position.x + dx * step;
  const py = activeObject.position.y + dy * step;

  const limitX = 30;
  const limitY = 30;

  activeObject.position.x = Math.max(
    anchorBase.x - limitX,
    Math.min(anchorBase.x + limitX, px)
  );

  activeObject.position.y = Math.max(
    anchorBase.y - limitY,
    Math.min(anchorBase.y + limitY, py)
  );
}

function onHoldMove(fn) {
  fn();
  holdTimerMove = setInterval(fn, 60);
}

function endHoldMove() {
  if (holdTimerMove) {
    clearInterval(holdTimerMove);
    holdTimerMove = null;
  }
}

movePad.up.addEventListener("pointerdown", () =>
  onHoldMove(() => moveActive(0, 1))
);
movePad.down.addEventListener("pointerdown", () =>
  onHoldMove(() => moveActive(0, -1))
);

);

        ctx.beginPath();
        ctx.moveTo(radius, 0);

        ctx.lineTo(canvas.width, canvas.height - radius);
        ctx.quadraticCurveTo(canvas.width, canvas.height, canvas.width - radius, canvas.height);

        ctx.quadraticCurveTo(0, canvas.height, 0, canvas.height - radius);
        ctx.lineTo(0, radius);
        ctx.quadraticCurveTo(0, 0, radius, 0);
        ctx.closePath();

          [slatR, slatR2, slatR3, flapR, flapR2, flapR3, spoilerR, spoilerR2, spoilerR3, aileronR, elevatorL, elevatorR, rudder].forEach(o => { model.add(o); overlayMeshes.push(o); });
          // Left wing overlays (mirrored) — placements left as symmetric copies
          const slatL = mkOverlay(size.x*0.09, size.y*0.01, size.z*0.03, orange);
          slatL.position.copy(center.clone().add(new THREE.Vector3(-size.x*0.20, size.y*-0.20, size.z*0.07)));
          const slatL2 = mkOverlay(size.x*0.09, size.y*0.01, size.z*0.03, orange);
          slatL2.position.copy(center.clone().add(new THREE.Vector3(-size.x*0.32, size.y*-0.20, size.z*0.010)));
          const slatL3 = mkOverlay(size.x*0.09, size.y*0.01, size.z*0.03, orange);
          slatL3.position.copy(center.clone().add(new THREE.Vector3(-size.x*0.43, size.y*-0.20, size.z*-0.04)));
          slatL.rotation.y -= Math.PI / 7;
          slatL2.rotation.y -= Math.PI / 7;
          slatL3.rotation.y -= Math.PI / 7;
          const flapL = mkOverlay(size.x*0.09, size.y*0.01, size.z*0.02, orange);
          flapL.position.copy(center.clone().add(new THREE.Vector3(-size.x*0.11, size.y*-0.22, size.z*-0.01)));
          flapL.rotation.y += Math.PI / 24;
          const flapL2 = mkOverlay(size.x*0.09, size.y*0.01, size.z*0.02, orange);
          flapL2.position.copy(center.clone().add(new THREE.Vector3(-size.x*0.19, size.y*-0.23, size.z*-0.02)));
          flapL2.rotation.y -= Math.PI / 9;
          const flapL3 = mkOverlay(size.x*0.14, size.y*0.01, size.z*0.02, orange);
          flapL3.position.copy(center.clone().add(new THREE.Vector3(-size.x*0.30, size.y*-0.22, size.z*-0.06)));
          flapL3.rotation.y -= Math.PI / 9;
          const spoilerL = mkOverlay(size.x*0.09, size.y*0.01, size.z*0.02, blue);

          spoilerL.rotation.y += Math.PI / 11;
          const spoilerL2 = mkOverlay(size.x*0.09, size.y*0.01, size.z*0.02, blue);

          [slatL, slatL2, slatL3, flapL, flapL2, flapL3, spoilerL, spoilerL2, spoilerL3, aileronL].forEach(o => { model.add(o); overlayMeshes.push(o); });

          // ===== PART DESCRIPTIONS =====
          const PART_DESCRIPTIONS = {
            'AILERONS': 'Located on the outer part of each wing. They control the roll of the aircraft by moving up on one wing and down on the other, causing the airplane to tilt left or right.',
            'ELEVATORS': 'Found on the horizontal tail (horizontal stabilizer). It controls the pitch of the aircraft, allowing the nose to move up or down.',
            'RUDDER': "Positioned on the vertical tail (vertical stabilizer). It controls the yaw, which moves the aircraft's nose left or right.",
            'FLAPS': 'Located on the inner section of the wings. They increase lift and drag, helping the aircraft during takeoff and landing by allowing slower flight speeds.',
            'SLATS': 'Installed on the front edge of the wings. They improve lift at low speeds and help prevent stalling during takeup and landing.',

          };

          function addCallout(target, text, offset) {
            const spr = makeLabel(String(text).toUpperCase(), '#ffffff');
            spr.scale.set(1.1, 0.28, 1);
            const labelPos = target.position.clone().add(offset || new THREE.Vector3(0, 0.22, 0));
            spr.position.copy(labelPos);
            spr.renderOrder = 10000;

            // Tag for popup
            spr.userData.partKey = String(text).toUpperCase();
            spr.userData.isPartLabel = true;
            const geom = new THREE.BufferGeometry().setFromPoints([target.position.clone(), labelPos.clone()]);
            const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.95, depthTest: false, depthWrite: false });
            const line = new THREE.Line(geom, mat);
            line.renderOrder = 9999;
            model.add(spr);
            model.add(line);
          labelLines.push(line);
          }
          addCallout(slatR, 'SLATS', new THREE.Vector3(-size.x*0.0, size.y*0.18, size.z*0.10));
          addCallout(spoilerR, 'SPOILERS', new THREE.Vector3(-size.x*0.0, size.y*0.28, size.z*0.02));
          addCallout(flapR, 'FLAPS', new THREE.Vector3(size.x*0.0, size.y*0.16, -size.z*0.08));
          addCallout(aileronR, 'AILERONS', new THREE.Vector3(size.x*0.0, size.y*0.22, -size.z*0.02));
          addCallout(elevatorR, 'ELEVATORS', new THREE.Vector3(-size.x*0, size.y*0.2, -size.z*0));
          addCallout(rudder, 'RUDDER', new THREE.Vector3(-size.x*0.0, size.y*0.50, -size.z*0));
          // Left wing callouts (mirrored)
          addCallout(slatL, 'SLATS', new THREE.Vector3(size.x*0.0, size.y*0.18, size.z*0.10));
          addCallout(spoilerL, 'SPOILERS', new THREE.Vector3(size.x*0.0, size.y*0.28, size.z*0.02));
          addCallout(flapL, 'FLAPS', new THREE.Vector3(-size.x*0.0, size.y*0.16, -size.z*0.08));
          addCallout(aileronL, 'AILERONS', new THREE.Vector3(-size.x*0.0, size.y*0.22, -size.z*0.02));

          // ===== POPUP RAYCASTER (set up once per model load) =====
          (function setupLabelClick() {
            const popup = document.getElementById('partPopup');
            const popupOverlay = document.getElementById('partPopupOverlay');
            const popupTitle = document.getElementById('popupTitle');
            const popupBody = document.getElementById('popupBody');
            const popupClose = document.getElementById('popupClose');

            function showPopup(key) {
              const desc = PART_DESCRIPTIONS[key];
              if (!desc) return;
              popupTitle.textContent = key;
              popupBody.textContent = desc;
              popup.classList.add('visible');
              popupOverlay.classList.add('visible');
            }
            function hidePopup() {
              popup.classList.remove('visible');
              popupOverlay.classList.remove('visible');
            }
            popupClose.addEventListener('click', hidePopup);
            popupOverlay.addEventListener('click', hidePopup);

            // Remove any previous raycaster listener to avoid duplicates
            if (window.__labelClickHandler) {
              renderer.domElement.removeEventListener('click', window.__labelClickHandler);
              renderer.domElement.removeEventListener('touchend', window.__labelClickHandler);
            }

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            window.__labelClickHandler = function(e) {
              // Ignore if popup is already open
              if (popup.classList.contains('visible')) return;
              const rect = renderer.domElement.getBoundingClientRect();
              let cx, cy;
              if (e.touches) {
                cx = e.changedTouches[0].clientX;
                cy = e.changedTouches[0].clientY;
              } else {
                cx = e.clientX;
                cy = e.clientY;
              }
              mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
              mouse.y = -((cy - rect.top) / rect.height) * 2 + 1;
              const cam = renderer.xr.isPresenting ? renderer.xr.getCamera() : camera;
              raycaster.setFromCamera(mouse, cam);
              const hits = raycaster.intersectObjects(labelSprites, false);
              for (const hit of hits) {
                if (hit.object.userData && hit.object.userData.isPartLabel) {
                  showPopup(hit.object.userData.partKey);
                  break;
                }
              }
            };

            renderer.domElement.addEventListener('click', window.__labelClickHandler);
            renderer.domElement.addEventListener('touchend', window.__labelClickHandler, { passive: true });
          })();
          scene.add(root);
          placed.push(root);
          activeObject = root;
          anchorBase = root.position.clone();
          try {
            for (let i = 0; i < 20; i++) adjustScale(0.9);
            //=========== DEFAULT ROTATION FOR 3D AIRCRAFT (after load) =======//
            // no roll tilt on spawn
            activeObject.rotation.x += SPAWN_ROT_UPDOWN_X;
            activeObject.rotation.y += SPAWN_ROT_UPDOWN_Y;
            activeObject.rotation.x += SPAWN_ROT_LEFTRIGHT_X;
            activeObject.rotation.y += SPAWN_ROT_LEFTRIGHT_Y;
          } catch (_) {}
        } catch (e) {
          alert('Failed to load 3D aircraft.');
        }
      }
      load3dBtn.addEventListener('click', async () => {
        try {
          if (!window._previewStream) { await window.__startCam(); }
          load3dAircraft();
        } catch(_) {}
      });
      window.__autoPlaceAfterCamera = () => {
        try { load3dAircraft(); } catch(e){}
      };
      // Only load after camera starts
      // Waiting for user to press "Start AR Aircraft" before starting camera
      window.__moduleReady = true;
      resetBtn.addEventListener('click', () => {
        placed.forEach(o => scene.remove(o));
        placed.length = 0;
        placeCount = 0;
      });
      window.__startCam = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false });
          let vid = document.getElementById('previewVideo');
          if (!vid) {
            vid = document.createElement('video');
            vid.id = 'previewVideo';
            vid.style.position = 'fixed';
            vid.style.inset = '0';
            vid.style.width = '100vw';
            vid.style.height = '100vh';
            vid.style.objectFit = 'cover';
            vid.style.zIndex = '1';
            vid.style.pointerEvents = 'none';
            vid.muted = true;
            vid.autoplay = true;
            vid.playsInline = true;
            document.body.appendChild(vid);
          }
          vid.srcObject = stream;
          await vid.play();
          window._previewStream = stream;
          startCamBtn.textContent = 'Stop Camera';
          try { startCamBtn.removeEventListener('click', __startHandler); } catch(_) {}
          startCamBtn.onclick = () => {
            if (window._previewStream) {
              window._previewStream.getTracks().forEach(t => t.stop());
              window._previewStream = null;
            }
            const v = document.getElementById('previewVideo');
            if (v) v.remove();
            startCamBtn.textContent = 'Start Camera';
            startCamBtn.onclick = null;
            try { startCamBtn.addEventListener('click', __startHandler); } catch(_) {}
          };
        } catch (e) {
          unsupported.classList.add('active');
          unsupportedMsg.innerHTML = '<h2>Camera blocked</h2><p>Allow camera permissions in site settings, then try again.</p>';
        }
      };
      __startHandler = () => window.__startCam();
      startCamBtn.addEventListener('click', __startHandler);
      renderer.xr.addEventListener('sessionstart', async () => {
        const v = document.getElementById('previewVideo');
        if (v) v.remove();
        if (window._previewStream) {
          window._previewStream.getTracks().forEach(t => t.stop());
          window._previewStream = null;
        }
        startCamBtn.textContent = 'Start Camera';
      });
      (function addGestureControls(){
        const pointers = new Map();
        let lastPinch = 0;
        let lastX = 0;
        window.addEventListener('pointerdown', (e) => {
          pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
          lastX = e.clientX;
        });
        window.addEventListener('pointermove', (e) => {
          if (!activeObject) return;
          const p = pointers.get(e.pointerId);
          if (!p) return;
          const dx = e.clientX - p.x;
          const dy = e.clientY - p.y;
          pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
          if (pointers.size === 1) {
            activeObject.rotation.y += dx * 0.005;
          } else if (pointers.size === 2) {
            const arr = Array.from(pointers.values());
            const d = Math.hypot(arr[0].x - arr[1].x, arr[0].y - arr[1].y);
            if (lastPinch) {
              const delta = d - lastPinch;
              const s = Math.max(0.5, Math.min(4, activeObject.scale.x + delta * 0.200));
              activeObject.scale.set(s, s, s);
            }
            lastPinch = d;
          }
        });
        window.addEventListener('pointerup', (e) => {
          pointers.delete(e.pointerId);
          if (pointers.size < 2) lastPinch = 0;
        });
        window.addEventListener('pointercancel', (e) => {
          pointers.delete(e.pointerId);
          if (pointers.size < 2) lastPinch = 0;
        });
      })();
    </script>

    <script>
      (function(){
        const enableStartOverlay = 1;
        function startCameraFallback(){
          try {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
              alert('Camera not available in this browser');
              return;
            }
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
              .then(stream => {
                var vid = document.getElementById('previewVideo');
                if (!vid) {
                  vid = document.createElement('video');
                  vid.id = 'previewVideo';
                  vid.style.position = 'fixed';
                  vid.style.inset = '0';
                  vid.style.width = '100vw';
                  vid.style.height = '100vh';
                  vid.style.objectFit = 'cover';
                  vid.style.zIndex = '1';
                  vid.style.pointerEvents = 'none';
                  vid.muted = true;
                  vid.autoplay = true;
                  vid.playsInline = true;
                  document.body.appendChild(vid);
                }
                vid.srcObject = stream;
                vid.play().catch(function(){});
              })
              .catch(function(){
                alert('Please allow camera permissions in site settings');
              });
          } catch(e) {
            alert('Camera error: ' + e);
          }
        }
        window.__startCam = window.__startCam || startCameraFallback;
        var startArBtn = document.getElementById('startArBtn');
        var startOverlay = document.getElementById('startOverlay');
        if (startOverlay) {
          if (!enableStartOverlay) {
            startOverlay.style.display = 'none';
          } else {
            startOverlay.style.display = '';
          }
        }
        if (startArBtn) startArBtn.addEventListener('click', function(){
          window.__startRequested = true;
          startCameraFallback();
          if (startOverlay) startOverlay.style.display = 'none';
          setTimeout(function(){
            if (window.__autoPlaceAfterCamera) window.__autoPlaceAfterCamera();
          }, 200);
        });
        var btn = document.getElementById('startCam');
        if (btn) btn.addEventListener('click', function(){
          window.__startRequested = true;
          startCameraFallback();
          setTimeout(function(){
            if (window.__autoPlaceAfterCamera) window.__autoPlaceAfterCamera();
            else {
              var tries = 0;
              var iv = setInterval(function(){
                if (window.__autoPlaceAfterCamera) { window.__autoPlaceAfterCamera(); clearInterval(iv); }
                if (++tries > 20) clearInterval(iv);
              }, 200);
            }
          }, 200);
        });
      })();
    </script>
    <script>
      (function(){
        if (window.__moduleReady) return;
        if (!window.THREE) return;

        scene.add(hemi);
        var dir = new THREE.DirectionalLight(0xffffff, 0.9);
        dir.position.set(1,2,1);
        scene.add(dir);
        var placed = [];
        var placeCount = 0;
        var lastPlacedSimple = null;
        var nonXrControls = null;
        function createButton(id, text, bottom) {

          if (b) return b;

          b.id = id;
          b.className = 'btn';

          document.body.appendChild(b);
          return b;
        }

        function adjustScale(f){ var o = window.__activeObject; if (!o) return; var s = Math.max(0.5, Math.min(4, o.scale.x * f)); o.scale.set(s,s,s) }

        zoomOutBtn.addEventListener('click', function(){ adjustScale(0.9) });
        function adjustHeight(d){ var o = window.__activeObject; if (!o) return; o.position.y += d }
        function adjustPitch(d){ var o = window.__activeObject; if (!o) return; o.rotation.x += d }
        function adjustOverlayTiltY(d){ overlayMeshes.forEach(function(m){ m.rotation.y += d }) }
        moveUpBtn.addEventListener('click', function(){ adjustHeight(0.5) });
        moveDownBtn.addEventListener('click', function(){ adjustHeight(-0.5) });
        tiltUpBtn.addEventListener('click', function(){ adjustPitch(0.05) });
        tiltDownBtn.addEventListener('click', function(){ adjustPitch(-0.05) });
        tiltLeftBtn.addEventListener('click', function(){ adjustOverlayTiltY(0.20) });
        tiltRightBtn.addEventListener('click', function(){ adjustOverlayTiltY(-0.20) });
        var joy = document.getElementById('joy');
        if (!joy) {
          joy = document.createElement('div');
          joy.id = 'joy';
          joy.style.position = 'fixed';
          joy.style.left = '16px';
          joy.style.bottom = '16px';
          joy.style.width = '120px';
          joy.style.height = '120px';
          joy.style.borderRadius = '60px';
          joy.style.background = 'rgba(255,255,255,0.08)';
          joy.style.border = '1px solid rgba(255,255,255,0.25)';
          joy.style.zIndex = '2000';
          joy.style.touchAction = 'none';
          var knob = document.createElement('div');
          knob.id = 'joyKnob';
          knob.style.position = 'absolute';
          knob.style.left = '50%';
          knob.style.top = '50%';
          knob.style.width = '48px';
          knob.style.height = '48px';
          knob.style.marginLeft = '-24px';
          knob.style.marginTop = '-24px';
          knob.style.borderRadius = '24px';
          knob.style.background = 'rgba(255,255,255,0.2)';
          knob.style.border = '1px solid rgba(255,255,255,0.35)';
          joy.appendChild(knob);
          document.body.appendChild(joy);
          var dragging = false;
          var center = { x:60, y:60 };
          function applyControl(dx,dy){
            var o = window.__activeObject; if (!o) return;
            o.rotation.y += dx * 0.005;
            var px = o.position.x + dx * 0.01;
            var pz = o.position.z + -dy * 0.01;
            if (!anchorBase) anchorBase = o.position.clone();
            var offX = px - anchorBase.x;
            var offZ = pz - anchorBase.z;
            var r = Math.sqrt(offX*offX + offZ*offZ);
            var limit = 10;
            if (r > limit) {
              var k = limit / r;
              o.position.x = anchorBase.x + offX * k;
              o.position.z = anchorBase.z + offZ * k;
            } else {
              o.position.x = px;
              o.position.z = pz;
            }
          }
          joy.addEventListener('pointerdown', function(e){ dragging = true; joy.setPointerCapture(e.pointerId) });
          joy.addEventListener('pointermove', function(e){
            if (!dragging) return;
            var rect = joy.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;
            var dx = x - center.x;
            var dy = y - center.y;
            var mag = Math.hypot(dx,dy);
            var max = 40;
            var nx = mag > max ? dx * (max / mag) : dx;
            var ny = mag > max ? dy * (max / mag) : dy;
            knob.style.transform = 'translate('+nx+'px,'+ny+'px)';
            applyControl(nx, ny);
          });
          joy.addEventListener('pointerup', function(){ dragging = false; knob.style.transform = 'translate(0,0)' });
        }
        function place() {
          var obj = makeAirplane();
          if (!nonXrControls && THREE.DeviceOrientationControls) {
            nonXrControls = new THREE.DeviceOrientationControls(camera);
            nonXrControls.connect();
          }
          renderer.domElement.style.position = 'fixed';
          renderer.domElement.style.inset = '0';
          renderer.domElement.style.zIndex = '2';
          var dist = 15;
          obj.position.set(0, 0, -dist);
          obj.rotation.y = Math.random() * Math.PI * 2;
          scene.add(obj);
          placed.push(obj);
          lastPlacedSimple = obj;
          window.__activeObject = obj;
          anchorBase = obj.position.clone();
          placeCount++;
        }
        placeBtn.addEventListener('click', async function(){
          try {
            if (!window._previewStream) await window.__startCam();
            load3d();
          } catch(e) {}
        });
        function makeLabel(text, color) {
          var canvas = document.createElement('canvas');
          canvas.width = 256; canvas.height = 64;
          var ctx = canvas.getContext('2d');
          ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,256,64);
          ctx.fillStyle = color || '#ffffff';
          ctx.font = '28px sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(text, 128, 32);
          var tex = new THREE.CanvasTexture(canvas);
          var mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
          var spr = new THREE.Sprite(mat);
          spr.scale.set(0.8, 0.2, 1);
          return spr;
        }
        function load3d() {
          try {
            var objUrl = 'https://assets.codepen.io/557388/1405+Plane_1.obj';
            var loader = new THREE.OBJLoader();
            var model = null;
            fetch(objUrl, { mode: 'cors' })
              .then(function(resp){ return resp.text() })
              .then(function(text){
                model = loader.parse(text);
                model.traverse(function(o){ if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; if (o.material && (o.material.map || o.material.isMeshStandardMaterial || o.material.isMeshPhongMaterial)) { try { o.material.color.setHex(0xEAF4FF) } catch(e){} } else { o.material = new THREE.MeshPhongMaterial({ color: 0xEAF4FF, specular: 0xffffff, shininess: 50 }); } } });
                model.scale.set(1,1,1);
              var root = new THREE.Group();
              var box = new THREE.Box3().setFromObject(model);
              var minY = box.min.y;
              model.position.y += -minY;
              root.add(model);
              var sized = new THREE.Box3().setFromObject(root);
              var size = new THREE.Vector3(); sized.getSize(size);
              var currentLen = Math.max(size.x, size.y, size.z);
              var factor = 64 / (currentLen || 1);
              root.scale.set(factor, factor, factor);
              if (lastPlacedSimple) {
                root.position.copy(lastPlacedSimple.position);
                root.rotation.copy(lastPlacedSimple.rotation);
                scene.remove(lastPlacedSimple);
                placed.splice(placed.indexOf(lastPlacedSimple), 1);
                lastPlacedSimple = null;
              } else {
                renderer.domElement.style.position = 'fixed';
                renderer.domElement.style.inset = '0';
                renderer.domElement.style.zIndex = '2';
                if (!nonXrControls && THREE.DeviceOrientationControls) { nonXrControls = new THREE.DeviceOrientationControls(camera); nonXrControls.connect(); }
                root.position.set(0,0,-15);
              }
              var box = new THREE.Box3().setFromObject(model);
              var size = new THREE.Vector3(); box.getSize(size);
              var center = new THREE.Vector3(); box.getCenter(center);
              [
                { t:'Ailerons', c:'#ff6b6b', o:new THREE.Vector3(size.x*0.2, size.y*0.15, size.z*0.45) },
                { t:'Flaps', c:'#ffd166', o:new THREE.Vector3(-size.x*0.05, size.y*0.1, size.z*0.30) },
                { t:'Spoilers', c:'#ffa500', o:new THREE.Vector3(0, size.y*0.2, 0) },
                { t:'Slats', c:'#d7dce3', o:new THREE.Vector3(size.x*0.25, size.y*0.05, size.z*0.15) },
                { t:'Elevators', c:'#00a3ff', o:new THREE.Vector3(-size.x*0.35, size.y*0.15, -size.z*0.35) },
                { t:'Rudder', c:'#59d97a', o:new THREE.Vector3(-size.x*0.38, size.y*0.35, -size.z*0.38) },
              ].forEach(function(x){
                var spr = makeLabel(x.t, x.c);
                spr.position.copy(center.clone().add(x.o));
                model.add(spr);
              });
              scene.add(root);
              placed.push(root);
              window.__activeObject = root;
            }).catch(function(e){
              try {
                loader.load(objUrl, function(obj){
                  model = obj;
                  model.traverse(function(o){ if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; if (o.material && (o.material.map || o.material.isMeshStandardMaterial || o.material.isMeshPhongMaterial)) { try { o.material.color.setHex(0xEAF4FF) } catch(e){} } else { o.material = new THREE.MeshPhongMaterial({ color: 0xEAF4FF, specular: 0xffffff, shininess: 50 }); } } });
                  model.scale.set(1,1,1);
                  var root = new THREE.Group();
                  var box = new THREE.Box3().setFromObject(model);
                  var minY = box.min.y;
                  model.position.y += -minY;
                  root.add(model);
                  var sized = new THREE.Box3().setFromObject(root);
                  var size = new THREE.Vector3(); sized.getSize(size);
                  var currentLen = Math.max(size.x, size.y, size.z);
                  var factor = 64 / (currentLen || 1);
                  root.scale.set(factor, factor, factor);
                  scene.add(root);
                  placed.push(root);
                  window.__activeObject = root;
                }, function(){}, function(){ place(); });
              } catch(_){ place(); }
            });
          } catch(e) { place(); }
        }
        load3dBtn.addEventListener('click', async function(){
          try {
            if (!window._previewStream) await window.__startCam();
            load3d();
          } catch(e) {}
        });
        resetBtn.addEventListener('click', function(){
          placed.forEach(function(o){ scene.remove(o) });
          placed.length = 0;
          placeCount = 0;
        });
        window.addEventListener('resize', function(){
          renderer.setSize(window.innerWidth, window.innerHeight);
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
        });
        function loop(){
          if (nonXrControls) nonXrControls.update();
          renderer.render(scene, camera);
          requestAnimationFrame(loop);
        }
        loop();
        window.__autoPlaceAfterCamera = window.__autoPlaceAfterCamera || function(){ try{ load3d() }catch(e){} };
        (function addGesture(){
          var pointers = {};
          var lastPinch = 0;
          window.addEventListener('pointerdown', function(e){ pointers[e.pointerId] = { x:e.clientX, y:e.clientY } });
          window.addEventListener('pointermove', function(e){
            var obj = window.__activeObject;
            if (!obj) return;
            var p = pointers[e.pointerId];
            if (!p) return;
            var dx = e.clientX - p.x;
            var dy = e.clientY - p.y;
            pointers[e.pointerId] = { x:e.clientX, y:e.clientY };
            var ids = Object.keys(pointers);
            if (ids.length === 1) {
              obj.rotation.y += dx * 0.005;
            } else if (ids.length === 2) {
              var a = pointers[ids[0]], b = pointers[ids[1]];
              var d = Math.hypot(a.x - b.x, a.y - b.y);
              if (lastPinch) {
                var delta = d - lastPinch;
                var s = Math.max(0.5, Math.min(4, obj.scale.x + delta * 0.002));
                obj.scale.set(s, s, s);
              }
              lastPinch = d;
            }
          });
          function end(e){ delete pointers[e.pointerId]; var ids = Object.keys(pointers); if (ids.length < 2) lastPinch = 0; }
          window.addEventListener('pointerup', end);
          window.addEventListener('pointercancel', end);
        })();
      })();
    </script>
