      /* ===== TITLE STYLES ===== */
.title {
  background: linear-gradient(135deg, #0044cc, #00aaff); /* Gradient color (blue to light blue) */

  justify-content: center;
}

.title img {
  height: 20px; /* Smaller logo size */
  margin-right: 4px; /* Reduce space between the logo and text */
}

/* Media Query for responsiveness */
@media (max-width: 768px) {
  .title {

          /* ===== D-PAD STYLES ===== */
    .dpad {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: clamp(96px, 28vw, 160px);
      height: clamp(96px, 28vw, 160px);
      z-index: 2000;
      touch-action: none;
    }

    .dpad-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      width: 100%;
      height: 100%;
    }

    .dpad-btn {
      place-self: center;
      width: 45%;
      height: 45%;
      border-radius: 999px;
      border: none;
      background: linear-gradient(145deg, #2b2b2b, #111);
      box-shadow:
        inset 2px 2px 4px rgba(255,255,255,0.15),
        inset -2px -2px 4px rgba(0,0,0,0.6),
        0 4px 10px rgba(0,0,0,0.5);
      opacity: 0.95;
    }

    .dpad-btn:active {
      transform: scale(0.92);
      box-shadow:
        inset 3px 3px 6px rgba(0,0,0,0.7);
    }

  /* ===== ZOOM IN BUTTON ===== */
  .zoom-btn {
    position: fixed;
    right: 16px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #2b2b2b, #111);
    box-shadow:
      inset 2px 2px 4px rgba(255,255,255,0.15),
      inset -2px -2px 4px rgba(0,0,0,0.6),
      0 4px 10px rgba(0,0,0,0.5);
    z-index: 2000;
  }
.top-controls {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  align-items: center;
  z-index: 2100;
}

/* Media Query for Mobile/Tablets */
@media (max-width: 768px) {
  .top-controls {
  position: fixed;
  bottom: 100px;
  left: 40%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  align-items: center;
  z-index: 2100;
  }
}

.control-btn {
  width: clamp(38px, 9vw, 44px);
  height: clamp(38px, 9vw, 44px);
  border-radius: 50%;
  border: none;
  background: linear-gradient(145deg, #2b2b2b, #111);
  color: white;
  font-size: 18px;
  display: grid;
  place-items: center;
  cursor: pointer;
}

  /* ===== MENU BUTTON ===== */
  .menu-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #2b2b2b, #111);
    box-shadow:
      inset 2px 2px 4px rgba(255,255,255,0.15),
      inset -2px -2px 4px rgba(0,0,0,0.6),
      0 4px 10px rgba(0,0,0,0.5);
    display: grid;
    place-items: center;
    z-index: 2100;
    cursor: pointer;
  }

  /* Hamburger */
  .menu-bars {
    width: 22px;
    height: 16px;
    display: grid;
    gap: 4px;
  }

  .menu-bar {
    height: 2px;
    background: rgba(255,255,255,0.9);
    border-radius: 2px;
    transition: 0.3s ease;
  }

  /* Animate to X */
  .menu-btn.active .menu-bar:nth-child(1) {
    transform: translateY(6px) rotate(45deg);
  }
  .menu-btn.active .menu-bar:nth-child(2) {
    opacity: 0;
  }
  .menu-btn.active .menu-bar:nth-child(3) {
    transform: translateY(-6px) rotate(-45deg);
  }

  /* ===== DROPDOWN MENU ===== */
.menu-dropdown {
  position: fixed;
  top: 70px;
  right: 16px;
  min-width: 200px;
  background: rgba(20,20,20,0.97);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 6px;
  z-index: 99999;

  opacity: 0;
  transform: translateY(-10px) scale(0.98);
  visibility: hidden;
  transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s;
}

.menu-dropdown.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  visibility: visible;
}

.menu-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

.menu-item:hover {
  background: rgba(255,255,255,0.08);
}

  const pitch = 0.04;
  activeObject.rotation.y += dx * yaw;
  activeObject.rotation.x += dy * pitch;

function onHoldRotate(fn) {
  fn();
  holdTimerRotate = setInterval(fn, 60);
}

function endHoldRotate() {
  if (holdTimerRotate) {
    clearInterval(holdTimerRotate);
    holdTimerRotate = null;
  }
}

);

            var o = window.__activeObject; if (!o) return;
            o.rotation.y += dx * 0.005;
            var px = o.position.x + dx * 0.01;
            var pz = o.position.z + -dy * 0.01;
            if (!anchorBase) anchorBase = o.position.clone();
            var offX = px - anchorBase.x;
            var offZ = pz - anchorBase.z;
            var r = Math.sqrt(offX*offX + offZ*offZ);
            var limit = 10;
            if (r > limit) {
              var k = limit / r;
              o.position.x = anchorBase.x + offX * k;
              o.position.z = anchorBase.z + offZ * k;
            } else {
              o.position.x = px;
              o.position.z = pz;
            }
          }
          joy.addEventListener('pointerdown', function(e){ dragging = true; joy.setPointerCapture(e.pointerId) });
          joy.addEventListener('pointermove', function(e){
            if (!dragging) return;
            var rect = joy.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;
            var dx = x - center.x;
            var dy = y - center.y;
            var mag = Math.hypot(dx,dy);
            var max = 40;
            var nx = mag > max ? dx * (max / mag) : dx;
            var ny = mag > max ? dy * (max / mag) : dy;
            knob.style.transform = 'translate('+nx+'px,'+ny+'px)';
            applyControl(nx, ny);
          });
          joy.addEventListener('pointerup', function(){ dragging = false; knob.style.transform = 'translate(0,0)' });
        }
        function place() {
          var obj = makeAirplane();
          if (!nonXrControls && THREE.DeviceOrientationControls) {
            nonXrControls = new THREE.DeviceOrientationControls(camera);
            nonXrControls.connect();
          }
          renderer.domElement.style.position = 'fixed';
          renderer.domElement.style.inset = '0';
          renderer.domElement.style.zIndex = '2';
          var dist = 15;
          obj.position.set(0, 0, -dist);
          obj.rotation.y = Math.random() * Math.PI * 2;
          scene.add(obj);
          placed.push(obj);
          lastPlacedSimple = obj;
          window.__activeObject = obj;
          anchorBase = obj.position.clone();
          placeCount++;
        }
        placeBtn.addEventListener('click', place);
        function makeLabel(text, color) {
          var canvas = document.createElement('canvas');
          canvas.width = 256; canvas.height = 64;
          var ctx = canvas.getContext('2d');
          ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,256,64);
          ctx.fillStyle = color || '#ffffff';
          ctx.font = '28px sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(text, 128, 32);
          var tex = new THREE.CanvasTexture(canvas);
          var mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
          var spr = new THREE.Sprite(mat);
          spr.scale.set(0.8, 0.2, 1);
          return spr;
        }
        function load3d() {
          try {
            var objUrl = 'https://assets.codepen.io/557388/1405+Plane_1.obj';
            var loader = new THREE.OBJLoader();
            var model = null;
            fetch(objUrl, { mode: 'cors' })
              .then(function(resp){ return resp.text() })
              .then(function(text){
                model = loader.parse(text);
                model.traverse(function(o){ if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; o.material = new THREE.MeshPhongMaterial({ color: 0x171511, specular: 0xD0CBC7, shininess: 5, flatShading: true }); } });
                model.scale.set(1,1,1);
              var root = new THREE.Group();
              var box = new THREE.Box3().setFromObject(model);
              var minY = box.min.y;
              model.position.y += -minY;
              root.add(model);
              var sized = new THREE.Box3().setFromObject(root);
              var size = new THREE.Vector3(); sized.getSize(size);
              var currentLen = Math.max(size.x, size.y, size.z);
              var factor = 64 / (currentLen || 1);
              root.scale.set(factor, factor, factor);
              if (lastPlacedSimple) {
                root.position.copy(lastPlacedSimple.position);
                root.rotation.copy(lastPlacedSimple.rotation);
                scene.remove(lastPlacedSimple);
                placed.splice(placed.indexOf(lastPlacedSimple), 1);
                lastPlacedSimple = null;
              } else {
                renderer.domElement.style.position = 'fixed';
                renderer.domElement.style.inset = '0';
                renderer.domElement.style.zIndex = '2';
                if (!nonXrControls && THREE.DeviceOrientationControls) { nonXrControls = new THREE.DeviceOrientationControls(camera); nonXrControls.connect(); }
                root.position.set(0,0,-15);
              }
              var box = new THREE.Box3().setFromObject(model);
              var size = new THREE.Vector3(); box.getSize(size);
              var center = new THREE.Vector3(); box.getCenter(center);
              [
                { t:'Ailerons', c:'#ff6b6b', o:new THREE.Vector3(size.x*0.2, size.y*0.15, size.z*0.45) },
                { t:'Flaps', c:'#ffd166', o:new THREE.Vector3(-size.x*0.05, size.y*0.1, size.z*0.30) },
                { t:'Spoilers', c:'#ffa500', o:new THREE.Vector3(0, size.y*0.2, 0) },
                { t:'Slats', c:'#d7dce3', o:new THREE.Vector3(size.x*0.25, size.y*0.05, size.z*0.15) },
                { t:'Elevators', c:'#00a3ff', o:new THREE.Vector3(-size.x*0.35, size.y*0.15, -size.z*0.35) },
                { t:'Rudder', c:'#59d97a', o:new THREE.Vector3(-size.x*0.38, size.y*0.35, -size.z*0.38) },
              ].forEach(function(x){
                var spr = makeLabel(x.t, x.c);
                spr.position.copy(center.clone().add(x.o));
                model.add(spr);
              });
              scene.add(root);
              placed.push(root);
              window.__activeObject = root;
            }).catch(function(e){
              try {
                loader.load(objUrl, function(obj){
                  model = obj;
                  model.traverse(function(o){ if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; o.material = new THREE.MeshPhongMaterial({ color: 0x171511, specular: 0xD0CBC7, shininess: 5, flatShading: true }); } });
                  model.scale.set(1,1,1);
                  var root = new THREE.Group();
                  var box = new THREE.Box3().setFromObject(model);
                  var minY = box.min.y;
                  model.position.y += -minY;
                  root.add(model);
                  var sized = new THREE.Box3().setFromObject(root);
                  var size = new THREE.Vector3(); sized.getSize(size);
                  var currentLen = Math.max(size.x, size.y, size.z);
                  var factor = 64 / (currentLen || 1);
                  root.scale.set(factor, factor, factor);
                  scene.add(root);
                  placed.push(root);
                  window.__activeObject = root;
                }, function(){}, function(){ place(); });
              } catch(_){ place(); }
            });
          } catch(e) { place(); }
        }
        load3dBtn.addEventListener('click', load3d);
        resetBtn.addEventListener('click', function(){
          placed.forEach(function(o){ scene.remove(o) });
          placed.length = 0;
          placeCount = 0;
        });
        window.addEventListener('resize', function(){
          renderer.setSize(window.innerWidth, window.innerHeight);
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
        });
        function loop(){
          if (nonXrControls) nonXrControls.update();
          renderer.render(scene, camera);
          requestAnimationFrame(loop);
        }
        loop();
        window.__autoPlaceAfterCamera = window.__autoPlaceAfterCamera || function(){ try{ load3d() }catch(e){} };
        setTimeout(function(){ try{ load3d() }catch(e){} }, 200);
        (function addGesture(){
          var pointers = {};
          var lastPinch = 0;
          window.addEventListener('pointerdown', function(e){ pointers[e.pointerId] = { x:e.clientX, y:e.clientY } });
          window.addEventListener('pointermove', function(e){
            var obj = window.__activeObject;
            if (!obj) return;
            var p = pointers[e.pointerId];
            if (!p) return;
            var dx = e.clientX - p.x;
            var dy = e.clientY - p.y;
            pointers[e.pointerId] = { x:e.clientX, y:e.clientY };
            var ids = Object.keys(pointers);
            if (ids.length === 1) {
              obj.rotation.y += dx * 0.005;
            } else if (ids.length === 2) {
              var a = pointers[ids[0]], b = pointers[ids[1]];
              var d = Math.hypot(a.x - b.x, a.y - b.y);
              if (lastPinch) {
                var delta = d - lastPinch;
                var s = Math.max(0.5, Math.min(4, obj.scale.x + delta * 0.002));
                obj.scale.set(s, s, s);
              }
              lastPinch = d;
            }
          });
          function end(e){ delete pointers[e.pointerId]; var ids = Object.keys(pointers); if (ids.length < 2) lastPinch = 0; }
          window.addEventListener('pointerup', end);
          window.addEventListener('pointercancel', end);
        })();
      })();
    </script>
  </body>
