<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Markerless AR Aircraft</title>
    <style>
      html, body { margin:0; height:100%; background:#000; color:#fff; font-family:system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif }
      #app { position:fixed; inset:0 }
      .overlay { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:10px 12px; background:linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,0)); z-index:1000; pointer-events:none }
      .title { font-weight:600; font-size:16px }
      .hint { font-size:12px; opacity:.9 }
      .unsupported { position:absolute; inset:0; display:none; align-items:center; justify-content:center; text-align:center; padding:24px; background:#0a0a0a }
      .unsupported.active { display:flex }
      .btn { position:fixed; bottom:12px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:#fff; padding:10px 14px; border-radius:10px; z-index:2000; cursor:pointer; pointer-events:auto }
    </style>
    <script type="module">
      import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js';
      import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/webxr/ARButton.js';
      import { RGBELoader } from 'https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/loaders/RGBELoader.js';
      let DeviceOrientationControls = null;
      try {
        ({ DeviceOrientationControls } = await import('https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/controls/DeviceOrientationControls.js'));
      } catch (e) {
        console.warn('DeviceOrientationControls import failed', e);
      }
      const { GLTFLoader } = await import('https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/loaders/GLTFLoader.js');

      const overlay = document.getElementById('overlay');
      const unsupported = document.getElementById('unsupported');
      const unsupportedMsg = unsupported.querySelector('div');

      const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.setClearColor(0x000000, 0);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);

      const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
      scene.add(hemi);
      const dir = new THREE.DirectionalLight(0xffffff, 0.9);
      dir.position.set(1,2,1);
      scene.add(dir);
      try {
        const pmrem = new THREE.PMREMGenerator(renderer);
        const hdr = await new RGBELoader().loadAsync('https://cdn.jsdelivr.net/gh/pmndrs/drei-assets@master/hdri/venice_sunset_1k.hdr');
        const env = pmrem.fromEquirectangular(hdr).texture;
        scene.environment = env;
        hdr.dispose();
        pmrem.dispose();
      } catch(e) { console.warn('HDR env load failed', e); }

      let xrHitTestSource = null;
      let viewerSpace = null;
      const reticle = new THREE.Mesh(new THREE.RingGeometry(0.15, 0.2, 32), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
      reticle.rotation.x = -Math.PI / 2;
      reticle.visible = false;
      scene.add(reticle);

      function makeAirplane() {
        const group = new THREE.Group();
        const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0xf5f7fb, metalness: 0.6, roughness: 0.25, clearcoat: 0.6, clearcoatRoughness: 0.2 });
        const metalMat = new THREE.MeshPhysicalMaterial({ color: 0x777777, metalness: 0.9, roughness: 0.2 });
        const glassMat = new THREE.MeshPhysicalMaterial({ color: 0x99b2d4, metalness: 0, roughness: 0.05, transmission: 0.6, transparent: true });
        if (scene.environment) { bodyMat.envMap = scene.environment; metalMat.envMap = scene.environment; glassMat.envMap = scene.environment; }
        const len = 6;
        const r = 0.6;
        const pts = [
          new THREE.Vector2(0, -len*0.5),
          new THREE.Vector2(r*0.2, -len*0.45),
          new THREE.Vector2(r*0.45, -len*0.3),
          new THREE.Vector2(r*0.6, -len*0.1),
          new THREE.Vector2(r*0.65, 0),
          new THREE.Vector2(r*0.6, len*0.1),
          new THREE.Vector2(r*0.5, len*0.3),
          new THREE.Vector2(r*0.35, len*0.4),
          new THREE.Vector2(r*0.15, len*0.47),
          new THREE.Vector2(0, len*0.5)
        ];
        const fuselageGeo = new THREE.LatheGeometry(pts, 64);
        const fuselage = new THREE.Mesh(fuselageGeo, bodyMat);
        group.add(fuselage);
        const wingThickness = 0.12;
        const rootChord = 2.2;
        const tipChord = 0.9;
        const semiSpan = 5;
        const wingShape = new THREE.Shape();
        wingShape.moveTo(0, 0);
        wingShape.lineTo(semiSpan, (tipChord - rootChord) * 0.5);
        wingShape.lineTo(semiSpan, (tipChord - rootChord) * 0.5 + tipChord);
        wingShape.lineTo(0, rootChord);
        const wingExtrude = new THREE.ExtrudeGeometry(wingShape, { depth: wingThickness, bevelEnabled: false, steps: 1 });
        const wingL = new THREE.Mesh(wingExtrude, bodyMat);
        wingL.position.set(0, -0.05, 0);
        wingL.rotation.x = Math.PI / 2;
        wingL.rotation.z = Math.PI / 180 * 5;
        const wingR = wingL.clone();
        wingR.scale.x = -1;
        group.add(wingL);
        group.add(wingR);
        const engRadius = 0.35;
        const engLen = 1;
        const engineL = new THREE.Mesh(new THREE.CylinderGeometry(engRadius, engRadius, engLen, 48), metalMat);
        engineL.rotation.x = Math.PI / 2;
        engineL.position.set(-semiSpan*0.5, -0.45, 0.9);
        const engineR = engineL.clone();
        engineR.position.x = semiSpan*0.5;
        group.add(engineL);
        group.add(engineR);
        const vTailShape = new THREE.Shape();
        vTailShape.moveTo(0,0);
        vTailShape.lineTo(0.05,0.0);
        vTailShape.lineTo(0.0,0.9);
        vTailShape.lineTo(-0.25,0.85);
        const vTail = new THREE.Mesh(new THREE.ExtrudeGeometry(vTailShape, { depth: 0.08, bevelEnabled: false }), bodyMat);
        vTail.rotation.y = Math.PI / 2;
        vTail.position.set(0, 0, -len*0.4);
        group.add(vTail);
        const hStabShape = new THREE.Shape();
        hStabShape.moveTo(0,0);
        hStabShape.lineTo(1.2, -0.25);
        hStabShape.lineTo(1.2, 0.25);
        hStabShape.lineTo(0, 0.45);
        const hStabL = new THREE.Mesh(new THREE.ExtrudeGeometry(hStabShape, { depth: 0.06, bevelEnabled: false }), bodyMat);
        hStabL.rotation.x = Math.PI / 2;
        hStabL.position.set(-0.9, 0.05, -len*0.38);
        const hStabR = hStabL.clone();
        hStabR.scale.x = -1;
        group.add(hStabL);
        group.add(hStabR);
        const cockpit = new THREE.Mesh(new THREE.SphereGeometry(r*0.45, 32, 16, 0, Math.PI), glassMat);
        cockpit.rotation.y = Math.PI;
        cockpit.position.set(0, 0.1, len*0.38);
        group.add(cockpit);
        const bb = new THREE.Box3().setFromObject(group);
        const minY = bb.min.y;
        group.position.y += -minY;
        return group;
      }

      let nonXrControls = null;

      const WORLD_SPAWN_DISTANCE = 12;
      const MODEL_SCALE = 0.02;
      const button = ARButton.createButton(renderer, { requiredFeatures:['hit-test'] });
      button.className = 'btn';
      button.textContent = 'Start AR';
      document.body.appendChild(button);
      button.addEventListener('click', async () => {
        console.log('[WebXR] Start AR clicked');
        try {
          // Prime permission so AR session can start smoothly
          const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
          s.getTracks().forEach(t => t.stop());
        } catch (_) {}
      });
      const startCamBtn = document.getElementById('startCam');
      const fallbackBtn = document.createElement('button');
      fallbackBtn.id = 'fallbackAR';
      fallbackBtn.className = 'btn';
      fallbackBtn.style.bottom = '156px';
      fallbackBtn.textContent = 'Open AR (Scene Viewer)';
      document.body.appendChild(fallbackBtn);
      const placeBtn = document.createElement('button');
      placeBtn.id = 'placePlane';
      placeBtn.className = 'btn';
      placeBtn.style.bottom = '108px';
      placeBtn.textContent = 'Place Aircraft';
      document.body.appendChild(placeBtn);
      const load3dBtn = document.createElement('button');
      load3dBtn.id = 'load3d';
      load3dBtn.className = 'btn';
      load3dBtn.style.bottom = '252px';
      load3dBtn.textContent = 'Load 3D Aircraft';
      document.body.appendChild(load3dBtn);
      const resetBtn = document.createElement('button');
      resetBtn.id = 'resetScene';
      resetBtn.className = 'btn';
      resetBtn.style.bottom = '204px';
      resetBtn.textContent = 'Reset';
      document.body.appendChild(resetBtn);

      window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
      });

      const controller = renderer.xr.getController(0);
      controller.addEventListener('select', () => {
        const obj = makeAirplane();
        if (reticle.visible) {
          obj.position.copy(reticle.position);
        } else {
          const xrCam = renderer.xr.getCamera();
          const dir = new THREE.Vector3(); xrCam.getWorldDirection(dir);
          const pos = new THREE.Vector3(); xrCam.getWorldPosition(pos);
          obj.position.copy(pos.add(dir.multiplyScalar(WORLD_SPAWN_DISTANCE)));
        }
        scene.add(obj);
      });
      scene.add(controller);

      renderer.setAnimationLoop((t, frame) => {
        if (renderer.xr.isPresenting) {
          if (xrHitTestSource && frame) {
            const results = frame.getHitTestResults(xrHitTestSource);
            if (results.length) {
              const hit = results[0];
              const pose = hit.getPose(renderer.xr.getReferenceSpace());
              reticle.visible = true;
              reticle.position.set(pose.transform.position.x, pose.transform.position.y, pose.transform.position.z);
            } else {
              reticle.visible = false;
            }
          }
          renderer.render(scene, camera);
        } else {
          if (nonXrControls) nonXrControls.update();
          renderer.render(scene, camera);
        }
      });

      const hasXR = 'xr' in navigator;
      let supported = false;
      try { supported = hasXR && await navigator.xr.isSessionSupported('immersive-ar'); } catch (_) { supported = false; }
      const secure = location.protocol === 'https:' || location.hostname === 'localhost';
      if (!secure) {
        unsupported.classList.add('active');
        unsupportedMsg.innerHTML = '<h2>Secure context required</h2><p>Open this page over HTTPS or localhost, then press Start AR.</p>';
      } else if (!supported) {
        unsupported.classList.add('active');
        const isAndroid = /Android/i.test(navigator.userAgent);
        if (isAndroid) {
          unsupportedMsg.innerHTML = '<h2>AR not supported</h2><p>Install or update Google Play Services for AR (ARCore), then try again.</p><p><a style=\"color:#7ec8ff\" href=\"https://play.google.com/store/apps/details?id=com.google.ar.core\" target=\"_blank\" rel=\"noopener\">Open Play Store</a></p>';
        } else {
          unsupportedMsg.innerHTML = '<h2>AR not supported</h2><p>Your browser/device does not support WebXR AR. Use Chrome on Android.</p>';
        }
        // Fallback: enable floating AR placement without hit-test
        button.textContent = 'Start Floating AR';
        button.addEventListener('click', async () => {
          // Ensure camera preview
          try {
            if (!window._previewStream) {
              const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
              let vid = document.getElementById('previewVideo');
              if (!vid) {
                vid = document.createElement('video');
                vid.id = 'previewVideo';
                vid.style.position = 'fixed';
                vid.style.inset = '0';
                vid.style.width = '100vw';
                vid.style.height = '100vh';
                vid.style.objectFit = 'cover';
                vid.style.zIndex = '1';
                vid.style.pointerEvents = 'none';
                vid.muted = true;
                vid.autoplay = true;
                vid.playsInline = true;
                document.body.appendChild(vid);
              }
              vid.srcObject = stream;
              await vid.play();
              window._previewStream = stream;
            }
          } catch (e) {}
          // Setup device orientation controls
          nonXrControls = new DeviceOrientationControls(camera);
          nonXrControls.connect();
          // Spawn airplane in front of camera
          const obj = makeAirplane();
          obj.position.set(0, 0, -WORLD_SPAWN_DISTANCE);
          scene.add(obj);
          // Bring canvas above video
          renderer.domElement.style.position = 'fixed';
          renderer.domElement.style.inset = '0';
          renderer.domElement.style.zIndex = '2';
        }, { once: true });
      }
      fallbackBtn.addEventListener('click', () => {
        const glb = encodeURIComponent('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumAir/glTF-Binary/CesiumAir.glb');
        const url = `https://arvr.google.com/scene-viewer/1.0?file=${glb}&mode=ar_preferred&title=Aircraft`;
        window.location.href = url;
      });
      const placed = [];
      let placeCount = 0;
      let lastPlacedSimple = null;
      function placeAircraft() {
        const obj = makeAirplane();
        if (renderer.xr.isPresenting) {
          const xrCam = renderer.xr.getCamera();
          const dir = new THREE.Vector3(); xrCam.getWorldDirection(dir);
          const pos = new THREE.Vector3(); xrCam.getWorldPosition(pos);
          const dist = WORLD_SPAWN_DISTANCE;
          obj.position.copy(pos.add(dir.multiplyScalar(dist)));
          obj.rotation.y = Math.random() * Math.PI * 2;
        } else {
          if (!window._previewStream) {
            // if preview is not running, try to start it quietly
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
              .then(stream => {
                window._previewStream = stream;
                let vid = document.getElementById('previewVideo');
                if (!vid) {
                  vid = document.createElement('video');
                  vid.id = 'previewVideo';
                  vid.style.position = 'fixed';
                  vid.style.inset = '0';
                  vid.style.width = '100vw';
                  vid.style.height = '100vh';
                  vid.style.objectFit = 'cover';
                  vid.style.zIndex = '1';
                  vid.style.pointerEvents = 'none';
                  vid.muted = true;
                  vid.autoplay = true;
                  vid.playsInline = true;
                  document.body.appendChild(vid);
                }
                vid.srcObject = stream;
                vid.play();
              }).catch(()=>{});
          }
          if (!nonXrControls && DeviceOrientationControls) {
            nonXrControls = new DeviceOrientationControls(camera);
            nonXrControls.connect();
          }
          renderer.domElement.style.position = 'fixed';
          renderer.domElement.style.inset = '0';
          renderer.domElement.style.zIndex = '2';
          const dist = WORLD_SPAWN_DISTANCE;
          obj.position.set(0, 0, -dist);
          obj.rotation.y = Math.random() * Math.PI * 2;
        }
        obj.scale.set(1.6,1.6,1.6);
        scene.add(obj);
        placed.push(obj);
        lastPlacedSimple = obj;
        placeCount++;
      }
      placeBtn.addEventListener('click', placeAircraft);
      function makeLabel(text, color) {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,256,64);
        ctx.fillStyle = color || '#ffffff';
        ctx.font = '28px sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(text, 128, 32);
        const tex = new THREE.CanvasTexture(canvas);
        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
        const spr = new THREE.Sprite(mat);
        spr.scale.set(0.8, 0.2, 1);
        return spr;
      }
      async function load3dAircraft() {
        try {
          const loader = new GLTFLoader();
          const glbUrl = 'https://raw.githubusercontent.com/Ysurac/FlightAirMap-3dmodels/master/b788/b788.glb';
          const gltf = await loader.loadAsync(glbUrl);
          const model = gltf.scene;
          model.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
          model.scale.set(MODEL_SCALE, MODEL_SCALE, MODEL_SCALE);
          const root = new THREE.Group();
          // Fix pivot: move model up so bottom (landing gear area) sits at root origin
          const tmpBox = new THREE.Box3().setFromObject(model);
          const minY = tmpBox.min.y;
          model.position.y += -minY;
          root.add(model);
          // Position: replace last simple if exists; else in front of camera
          if (lastPlacedSimple) {
            root.position.copy(lastPlacedSimple.position);
            root.rotation.copy(lastPlacedSimple.rotation);
            scene.remove(lastPlacedSimple);
            placed.splice(placed.indexOf(lastPlacedSimple), 1);
            lastPlacedSimple = null;
          } else {
            if (renderer.xr.isPresenting) {
              const xrCam = renderer.xr.getCamera();
              const dir = new THREE.Vector3(); xrCam.getWorldDirection(dir);
              const pos = new THREE.Vector3(); xrCam.getWorldPosition(pos);
              root.position.copy(pos.add(dir.multiplyScalar(WORLD_SPAWN_DISTANCE)));
            } else {
              renderer.domElement.style.position = 'fixed';
              renderer.domElement.style.inset = '0';
              renderer.domElement.style.zIndex = '2';
              if (!nonXrControls && DeviceOrientationControls) { nonXrControls = new DeviceOrientationControls(camera); nonXrControls.connect(); }
              root.position.set(0,0,-WORLD_SPAWN_DISTANCE);
            }
          }
          // Add approximate labels around the aircraft
          const box = new THREE.Box3().setFromObject(model);
          const size = new THREE.Vector3(); box.getSize(size);
          const center = new THREE.Vector3(); box.getCenter(center);
          const labels = [
            { text:'Ailerons', color:'#ff6b6b', offset:new THREE.Vector3(size.x*0.2, size.y*0.15, size.z*0.45) },
            { text:'Flaps', color:'#ffd166', offset:new THREE.Vector3(-size.x*0.05, size.y*0.1, size.z*0.30) },
            { text:'Spoilers', color:'#ffa500', offset:new THREE.Vector3(0, size.y*0.2, 0) },
            { text:'Slats', color:'#d7dce3', offset:new THREE.Vector3(size.x*0.25, size.y*0.05, size.z*0.15) },
            { text:'Elevators', color:'#00a3ff', offset:new THREE.Vector3(-size.x*0.35, size.y*0.15, -size.z*0.35) },
            { text:'Rudder', color:'#59d97a', offset:new THREE.Vector3(-size.x*0.38, size.y*0.35, -size.z*0.38) },
          ];
          labels.forEach(({text,color,offset}) => {
            const spr = makeLabel(text, color);
            spr.position.copy(center.clone().add(offset));
            model.add(spr);
          });
          scene.add(root);
          placed.push(root);
        } catch (e) {
          alert('Failed to load 3D aircraft. Using simple model instead.');
          placeAircraft();
        }
      }
      load3dBtn.addEventListener('click', load3dAircraft);
      window.__autoPlaceAfterCamera = () => {
        try { load3dAircraft(); } catch(e){}
      };
      setTimeout(() => { try { load3dAircraft(); } catch(_){} }, 300);
      if (window.__startRequested) {
        setTimeout(() => { try { window.__autoPlaceAfterCamera(); } catch(_){} }, 100);
      }
      window.__moduleReady = true;
      resetBtn.addEventListener('click', () => {
        placed.forEach(o => scene.remove(o));
        placed.length = 0;
        placeCount = 0;
      });
      window.__startCam = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false });
          let vid = document.getElementById('previewVideo');
          if (!vid) {
            vid = document.createElement('video');
            vid.id = 'previewVideo';
            vid.style.position = 'fixed';
            vid.style.inset = '0';
            vid.style.width = '100vw';
            vid.style.height = '100vh';
            vid.style.objectFit = 'cover';
            vid.style.zIndex = '1';
            vid.style.pointerEvents = 'none';
            vid.muted = true;
            vid.autoplay = true;
            vid.playsInline = true;
            document.body.appendChild(vid);
          }
          vid.srcObject = stream;
          await vid.play();
          window._previewStream = stream;
          startCamBtn.textContent = 'Stop Camera';
          startCamBtn.onclick = () => {
            if (window._previewStream) {
              window._previewStream.getTracks().forEach(t => t.stop());
              window._previewStream = null;
            }
            const v = document.getElementById('previewVideo');
            if (v) v.remove();
            startCamBtn.textContent = 'Start Camera';
          };
        } catch (e) {
          unsupported.classList.add('active');
          unsupportedMsg.innerHTML = '<h2>Camera blocked</h2><p>Allow camera permissions in site settings, then try again.</p>';
        }
      };
      startCamBtn.addEventListener('click', () => window.__startCam());
      renderer.xr.addEventListener('sessionstart', async () => {
        const v = document.getElementById('previewVideo');
        if (v) v.remove();
        if (window._previewStream) {
          window._previewStream.getTracks().forEach(t => t.stop());
          window._previewStream = null;
        }
        startCamBtn.textContent = 'Start Camera';
        try {
          const session = renderer.xr.getSession();
          viewerSpace = await session.requestReferenceSpace('viewer');
          const refSpace = await renderer.xr.getReferenceSpace();
          xrHitTestSource = await session.requestHitTestSource({ space: viewerSpace });
        } catch (_) {}
      });
    </script>
  </head>
  <body>
    <div id="app">
      <div id="overlay" class="overlay">
        <div class="title">Markerless AR Aircraft</div>
        <div class="hint">Move phone to detect a surface, tap to place</div>
      </div>
      <div id="unsupported" class="unsupported">
        <div>
          <h2>Markerless AR not available</h2>
          <p>Use Chrome on Android with HTTPS, then press Start AR.</p>
        </div>
      </div>
      <button class="btn" id="startCam" style="bottom:60px" onclick="window.__startCam && window.__startCam()">Start Camera</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/controls/DeviceOrientationControls.js"></script>
    <script>
      (function(){
        function startCameraFallback(){
          try {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
              alert('Camera not available in this browser');
              return;
            }
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
              .then(stream => {
                var vid = document.getElementById('previewVideo');
                if (!vid) {
                  vid = document.createElement('video');
                  vid.id = 'previewVideo';
                  vid.style.position = 'fixed';
                  vid.style.inset = '0';
                  vid.style.width = '100vw';
                  vid.style.height = '100vh';
                  vid.style.objectFit = 'cover';
                  vid.style.zIndex = '1';
                  vid.style.pointerEvents = 'none';
                  vid.muted = true;
                  vid.autoplay = true;
                  vid.playsInline = true;
                  document.body.appendChild(vid);
                }
                vid.srcObject = stream;
                vid.play().catch(function(){});
              })
              .catch(function(){
                alert('Please allow camera permissions in site settings');
              });
          } catch(e) {
            alert('Camera error: ' + e);
          }
        }
        window.__startCam = window.__startCam || startCameraFallback;
        var btn = document.getElementById('startCam');
        if (btn) btn.addEventListener('click', function(){
          window.__startRequested = true;
          startCameraFallback();
          setTimeout(function(){
            if (window.__autoPlaceAfterCamera) window.__autoPlaceAfterCamera();
            else {
              var tries = 0;
              var iv = setInterval(function(){
                if (window.__autoPlaceAfterCamera) { window.__autoPlaceAfterCamera(); clearInterval(iv); }
                if (++tries > 20) clearInterval(iv);
              }, 200);
            }
          }, 200);
        });
      })();
    </script>
    <script>
      (function(){
        if (window.__moduleReady) return;
        if (!window.THREE) return;
        var renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        document.body.appendChild(renderer.domElement);
        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
        var hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(hemi);
        var dir = new THREE.DirectionalLight(0xffffff, 0.9);
        dir.position.set(1,2,1);
        scene.add(dir);
        function makeAirplane() {
          var group = new THREE.Group();
          var bodyMat = new THREE.MeshPhysicalMaterial({ color: 0xf5f7fb, metalness: 0.6, roughness: 0.25, clearcoat: 0.6, clearcoatRoughness: 0.2 });
          var metalMat = new THREE.MeshPhysicalMaterial({ color: 0x777777, metalness: 0.9, roughness: 0.2 });
          var glassMat = new THREE.MeshPhysicalMaterial({ color: 0x99b2d4, metalness: 0, roughness: 0.05, transmission: 0.6, transparent: true });
          var len = 6;
          var r = 0.6;
          var pts = [
            new THREE.Vector2(0, -len*0.5),
            new THREE.Vector2(r*0.2, -len*0.45),
            new THREE.Vector2(r*0.45, -len*0.3),
            new THREE.Vector2(r*0.6, -len*0.1),
            new THREE.Vector2(r*0.65, 0),
            new THREE.Vector2(r*0.6, len*0.1),
            new THREE.Vector2(r*0.5, len*0.3),
            new THREE.Vector2(r*0.35, len*0.4),
            new THREE.Vector2(r*0.15, len*0.47),
            new THREE.Vector2(0, len*0.5)
          ];
          var fuselage = new THREE.Mesh(new THREE.LatheGeometry(pts, 64), bodyMat);
          group.add(fuselage);
          var wingThickness = 0.12;
          var rootChord = 2.2;
          var tipChord = 0.9;
          var semiSpan = 5;
          var wingShape = new THREE.Shape();
          wingShape.moveTo(0, 0);
          wingShape.lineTo(semiSpan, (tipChord - rootChord) * 0.5);
          wingShape.lineTo(semiSpan, (tipChord - rootChord) * 0.5 + tipChord);
          wingShape.lineTo(0, rootChord);
          var wingExtrude = new THREE.ExtrudeGeometry(wingShape, { depth: wingThickness, bevelEnabled: false, steps: 1 });
          var wingL = new THREE.Mesh(wingExtrude, bodyMat);
          wingL.position.set(0, -0.05, 0);
          wingL.rotation.x = Math.PI / 2;
          wingL.rotation.z = Math.PI / 180 * 5;
          var wingR = wingL.clone();
          wingR.scale.x = -1;
          group.add(wingL);
          group.add(wingR);
          var engineL = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1, 48), metalMat);
          engineL.rotation.x = Math.PI / 2;
          engineL.position.set(-semiSpan*0.5, -0.45, 0.9);
          var engineR = engineL.clone();
          engineR.position.x = semiSpan*0.5;
          group.add(engineL);
          group.add(engineR);
          var vTailShape = new THREE.Shape();
          vTailShape.moveTo(0,0);
          vTailShape.lineTo(0.05,0.0);
          vTailShape.lineTo(0.0,0.9);
          vTailShape.lineTo(-0.25,0.85);
          var vTail = new THREE.Mesh(new THREE.ExtrudeGeometry(vTailShape, { depth: 0.08, bevelEnabled: false }), bodyMat);
          vTail.rotation.y = Math.PI / 2;
          vTail.position.set(0, 0, -len*0.4);
          group.add(vTail);
          var hStabShape = new THREE.Shape();
          hStabShape.moveTo(0,0);
          hStabShape.lineTo(1.2, -0.25);
          hStabShape.lineTo(1.2, 0.25);
          hStabShape.lineTo(0, 0.45);
          var hStabL = new THREE.Mesh(new THREE.ExtrudeGeometry(hStabShape, { depth: 0.06, bevelEnabled: false }), bodyMat);
          hStabL.rotation.x = Math.PI / 2;
          hStabL.position.set(-0.9, 0.05, -len*0.38);
          var hStabR = hStabL.clone();
          hStabR.scale.x = -1;
          group.add(hStabL);
          group.add(hStabR);
          var cockpit = new THREE.Mesh(new THREE.SphereGeometry(r*0.45, 32, 16, 0, Math.PI), glassMat);
          cockpit.rotation.y = Math.PI;
          cockpit.position.set(0, 0.1, len*0.38);
          group.add(cockpit);
          var bb = new THREE.Box3().setFromObject(group);
          var minY = bb.min.y;
          group.position.y += -minY;
          return group;
        }
        var placed = [];
        var placeCount = 0;
        var lastPlacedSimple = null;
        var nonXrControls = null;
        function createButton(id, text, bottom) {
          var b = document.getElementById(id);
          if (b) return b;
          b = document.createElement('button');
          b.id = id;
          b.className = 'btn';
          b.style.bottom = bottom;
          b.textContent = text;
          document.body.appendChild(b);
          return b;
        }
        var placeBtn = createButton('placePlane', 'Place Aircraft', '108px');
        var load3dBtn = createButton('load3d', 'Load 3D Aircraft', '252px');
        var resetBtn = createButton('resetScene', 'Reset', '204px');
        function place() {
          var obj = makeAirplane();
          if (!nonXrControls && THREE.DeviceOrientationControls) {
            nonXrControls = new THREE.DeviceOrientationControls(camera);
            nonXrControls.connect();
          }
          renderer.domElement.style.position = 'fixed';
          renderer.domElement.style.inset = '0';
          renderer.domElement.style.zIndex = '2';
          var dist = 15;
          obj.position.set(0, 0, -dist);
          obj.rotation.y = Math.random() * Math.PI * 2;
          scene.add(obj);
          placed.push(obj);
          lastPlacedSimple = obj;
          placeCount++;
        }
        placeBtn.addEventListener('click', place);
        function makeLabel(text, color) {
          var canvas = document.createElement('canvas');
          canvas.width = 256; canvas.height = 64;
          var ctx = canvas.getContext('2d');
          ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,256,64);
          ctx.fillStyle = color || '#ffffff';
          ctx.font = '28px sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(text, 128, 32);
          var tex = new THREE.CanvasTexture(canvas);
          var mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
          var spr = new THREE.Sprite(mat);
          spr.scale.set(0.8, 0.2, 1);
          return spr;
        }
        function load3d() {
          try {
            var loader = new THREE.GLTFLoader();
            var glbUrl = 'https://raw.githubusercontent.com/Ysurac/FlightAirMap-3dmodels/master/b788/b788.glb';
            loader.load(glbUrl, function(gltf){
              var model = gltf.scene;
              model.traverse(function(o){ if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
              model.scale.set(0.02,0.02,0.02);
              var root = new THREE.Group();
              var box = new THREE.Box3().setFromObject(model);
              var minY = box.min.y;
              model.position.y += -minY;
              root.add(model);
              if (lastPlacedSimple) {
                root.position.copy(lastPlacedSimple.position);
                root.rotation.copy(lastPlacedSimple.rotation);
                scene.remove(lastPlacedSimple);
                placed.splice(placed.indexOf(lastPlacedSimple), 1);
                lastPlacedSimple = null;
              } else {
                renderer.domElement.style.position = 'fixed';
                renderer.domElement.style.inset = '0';
                renderer.domElement.style.zIndex = '2';
                if (!nonXrControls && THREE.DeviceOrientationControls) { nonXrControls = new THREE.DeviceOrientationControls(camera); nonXrControls.connect(); }
                root.position.set(0,0,-15);
              }
              var box = new THREE.Box3().setFromObject(model);
              var size = new THREE.Vector3(); box.getSize(size);
              var center = new THREE.Vector3(); box.getCenter(center);
              [
                { t:'Ailerons', c:'#ff6b6b', o:new THREE.Vector3(size.x*0.2, size.y*0.15, size.z*0.45) },
                { t:'Flaps', c:'#ffd166', o:new THREE.Vector3(-size.x*0.05, size.y*0.1, size.z*0.30) },
                { t:'Spoilers', c:'#ffa500', o:new THREE.Vector3(0, size.y*0.2, 0) },
                { t:'Slats', c:'#d7dce3', o:new THREE.Vector3(size.x*0.25, size.y*0.05, size.z*0.15) },
                { t:'Elevators', c:'#00a3ff', o:new THREE.Vector3(-size.x*0.35, size.y*0.15, -size.z*0.35) },
                { t:'Rudder', c:'#59d97a', o:new THREE.Vector3(-size.x*0.38, size.y*0.35, -size.z*0.38) },
              ].forEach(function(x){
                var spr = makeLabel(x.t, x.c);
                spr.position.copy(center.clone().add(x.o));
                model.add(spr);
              });
              scene.add(root);
              placed.push(root);
            }, function(){}, function(){ place(); });
          } catch(e) { place(); }
        }
        load3dBtn.addEventListener('click', load3d);
        resetBtn.addEventListener('click', function(){
          placed.forEach(function(o){ scene.remove(o) });
          placed.length = 0;
          placeCount = 0;
        });
        window.addEventListener('resize', function(){
          renderer.setSize(window.innerWidth, window.innerHeight);
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
        });
        function loop(){
          if (nonXrControls) nonXrControls.update();
          renderer.render(scene, camera);
          requestAnimationFrame(loop);
        }
        loop();
        window.__autoPlaceAfterCamera = window.__autoPlaceAfterCamera || function(){ try{ load3d() }catch(e){} };
        setTimeout(function(){ try{ load3d() }catch(e){} }, 200);
      })();
    </script>
  </body>
</html>
