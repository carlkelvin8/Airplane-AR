<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AR Aircraft</title>
  <link rel="icon" type="image/x-icon" href="asset/favicon.ico">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#1a1a2e;color:#fff;font-family:system-ui,sans-serif;overflow:hidden}
    #startOverlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);z-index:3000}
    .start-btn{background:linear-gradient(135deg,#0044cc,#00aaff);color:#fff;font-size:1.1rem;font-weight:bold;padding:14px 24px;border-radius:12px;border:none;cursor:pointer;display:flex;align-items:center;gap:8px}
    .start-btn img{height:22px}
    .overlay{position:fixed;top:0;left:0;right:0;padding:10px 12px;z-index:1000;pointer-events:none}
    .title{background:linear-gradient(135deg,#0044cc,#00aaff);color:#fff;font-size:1rem;font-weight:bold;padding:6px 12px;border-radius:8px;display:inline-flex;align-items:center;gap:4px}
    .title img{height:18px}
    .dpad{position:fixed;width:clamp(80px,24vw,130px);height:clamp(80px,24vw,130px);z-index:2000;touch-action:none;pointer-events:none}
    .dpad-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:100%;height:100%;pointer-events:none}
    .dpad-btn{place-self:center;width:100%;height:100%;border:none;background:transparent;z-index:1;pointer-events:auto}
    .dpad-btn:active{transform:scale(0.93)}
    .mi{padding:10px 12px;color:#fff;cursor:pointer;border-radius:6px;font-size:0.9rem}
    .mi:hover{background:rgba(255,255,255,0.08)}
  </style>
</head>
<body>
  <div id="startOverlay">
    <button id="startBtn" class="start-btn"><img src="asset/airplane.png" alt=""> Start AR Aircraft</button>
  </div>
  <div class="overlay"><div class="title"><img src="asset/airplane.png" alt=""> AR Aircraft</div></div>

  <!-- Popup -->
  <div id="popupBg" style="display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.4)"></div>
  <div id="popup" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111827;border:1px solid rgba(100,180,255,0.3);border-radius:14px;padding:18px;max-width:320px;width:90%;z-index:9999;color:#fff">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <b id="popupTitle" style="color:#7ec8ff;text-transform:uppercase;font-size:0.9rem"></b>
      <button id="popupClose" style="background:none;border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:14px">✕</button>
    </div>
    <p id="popupBody" style="font-size:0.85rem;line-height:1.6;color:rgba(255,255,255,0.85)"></p>
  </div>

  <!-- Menu -->
  <button id="menuBtn" style="position:fixed;top:12px;right:12px;width:40px;height:40px;border-radius:50%;border:none;background:rgba(0,0,0,0.5);color:#fff;font-size:20px;z-index:2100;cursor:pointer">☰</button>
  <div id="menuDrop" style="display:none;position:fixed;top:60px;right:12px;background:rgba(15,15,25,0.95);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:6px;z-index:2100;min-width:160px">
    <div class="mi" id="miLabels">Hide Labels</div>
    <div class="mi" id="miReset">Reset</div>
  </div>

  <!-- Zoom -->
  <div id="zoomControls" style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);display:flex;gap:14px;z-index:3000;touch-action:manipulation">
    <button id="zoomIn" style="width:56px;height:56px;border-radius:50%;border:2px solid rgba(100,180,255,0.5);background:rgba(10,10,30,0.95);color:#fff;font-size:1.6rem;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;line-height:1">+</button>
    <button id="zoomOut" style="width:56px;height:56px;border-radius:50%;border:2px solid rgba(100,180,255,0.5);background:rgba(10,10,30,0.95);color:#fff;font-size:1.6rem;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;line-height:1">−</button>
  </div>

  <script type="importmap">
  {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

  // ===== GLOBALS =====
  var scene, camera, renderer, activeObject, anchorBase;
  var labelSprites = [], labelLines = [], overlayMeshes = [];
  var autoRotate = true, bouncePrev = 0, labelsVisible = true;

  var PARTS = {
    SLATS:'Installed on the front edge of the wings. They improve lift at low speeds and help prevent stalling during takeoff and landing.',
    FLAPS:'Located on the inner section of the wings. They increase lift and drag, helping the aircraft during takeoff and landing.',
    SPOILERS:'Panels on the top of the wings that reduce lift and increase drag. Used to descend faster or slow down after landing.',
    AILERONS:'Located on the outer part of each wing. They control roll by moving up on one wing and down on the other.',
    ELEVATORS:'Found on the horizontal tail. They control pitch, allowing the nose to move up or down.',
    RUDDER:"On the vertical tail. It controls yaw, moving the aircraft's nose left or right."
  };

  function init() {
    renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x1a1a2e, 1);
    renderer.domElement.style.cssText = 'position:fixed;inset:0;z-index:1';
    document.body.appendChild(renderer.domElement);

    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 1000);

    scene.add(new THREE.HemisphereLight(0xddeeff, 0x334455, 1.5));
    var d = new THREE.DirectionalLight(0xffffff, 1.2); d.position.set(3,5,4); scene.add(d);
    var f = new THREE.DirectionalLight(0x8899bb, 0.5); f.position.set(-2,1,-3); scene.add(f);

    window.addEventListener('resize', function(){
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
    });
    animate();
  }

  function animate() {
    requestAnimationFrame(animate);
    if (activeObject) {
      var t = performance.now() * 0.001;
      var bo = Math.sin(t * 2.0) * 0.08;
      activeObject.position.y += (bo - bouncePrev);
      bouncePrev = bo;
      activeObject.rotation.z = Math.sin(t * 0.8) * 0.01;
      if (autoRotate) activeObject.rotation.y += 0.002;
    }
    if (renderer) renderer.render(scene, camera);
  }

  function loadAircraft() {
    var loader = new OBJLoader();
    fetch('https://assets.codepen.io/557388/1405+Plane_1.obj')
      .then(function(r){ return r.text(); })
      .then(function(text){
        var model = loader.parse(text);
        setupModel(model);
      })
      .catch(function(e){
        console.warn('OBJ failed:', e);
        alert('Model load failed: ' + e.message);
      });
  }

  function setupModel(model) {
    model.traverse(function(o){
      if (o.isMesh) {
        o.castShadow = true;
        o.material = new THREE.MeshPhongMaterial({color:0xE8F0F8, specular:0xffffff, shininess:60});
      }
    });

    var root = new THREE.Group();
    var box = new THREE.Box3().setFromObject(model);
    model.position.y -= box.min.y;
    root.add(model);

    // Scale to fit in view
    var sb = new THREE.Box3().setFromObject(root);
    var sv = new THREE.Vector3(); sb.getSize(sv);
    var maxDim = Math.max(sv.x, sv.y, sv.z);
    var scale = 5 / (maxDim || 1);
    root.scale.set(scale, scale, scale);

    root.position.set(0, -0.5, -7);
    root.rotation.x = 0.4;
    root.rotation.y = -0.3;

    if (activeObject) scene.remove(activeObject);
    scene.add(root);
    activeObject = root;
    anchorBase = root.position.clone();

    try { addOverlays(model); } catch(e){ console.warn('Overlays error:', e); }
  }

  function addOverlays(model) {
    var box = new THREE.Box3().setFromObject(model);
    var size = new THREE.Vector3(); box.getSize(size);
    var center = new THREE.Vector3(); box.getCenter(center);
    var blue = new THREE.MeshBasicMaterial({color:0x2ea7ff,transparent:true,opacity:0.85,depthTest:false,depthWrite:false});
    var orange = new THREE.MeshBasicMaterial({color:0xffa429,transparent:true,opacity:0.85,depthTest:false,depthWrite:false});
    function mk(w,h,d,mat,pos,rotY){
      var m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
      m.position.copy(center.clone().add(pos));
      if(rotY) m.rotation.y=rotY;
      m.renderOrder=9998; model.add(m); overlayMeshes.push(m); return m;
    }
    // Right wing parts
    var slatR=mk(size.x*0.09,size.y*0.02,size.z*0.04,orange,new THREE.Vector3(size.x*0.25,-size.y*0.2,size.z*0.07),Math.PI/7);
    var flapR=mk(size.x*0.12,size.y*0.02,size.z*0.03,orange,new THREE.Vector3(size.x*0.18,-size.y*0.22,-size.z*0.03),Math.PI/9);
    var spoilerR=mk(size.x*0.1,size.y*0.02,size.z*0.03,blue,new THREE.Vector3(size.x*0.17,-size.y*0.19,0),Math.PI/9);
    var aileronR=mk(size.x*0.13,size.y*0.02,size.z*0.03,blue,new THREE.Vector3(size.x*0.42,-size.y*0.2,-size.z*0.08),Math.PI/9);
    // Left wing parts (mirrored)
    var slatL=mk(size.x*0.09,size.y*0.02,size.z*0.04,orange,new THREE.Vector3(-size.x*0.25,-size.y*0.2,size.z*0.07),-Math.PI/7);
    var flapL=mk(size.x*0.12,size.y*0.02,size.z*0.03,orange,new THREE.Vector3(-size.x*0.18,-size.y*0.22,-size.z*0.03),-Math.PI/9);
    var spoilerL=mk(size.x*0.1,size.y*0.02,size.z*0.03,blue,new THREE.Vector3(-size.x*0.17,-size.y*0.19,0),-Math.PI/9);
    var aileronL=mk(size.x*0.13,size.y*0.02,size.z*0.03,blue,new THREE.Vector3(-size.x*0.42,-size.y*0.2,-size.z*0.08),-Math.PI/9);
    // Tail
    var elevR=mk(size.x*0.13,size.y*0.02,size.z*0.03,blue,new THREE.Vector3(size.x*0.09,-size.y*0.04,-size.z*0.45),Math.PI/12);
    var elevL=mk(size.x*0.13,size.y*0.02,size.z*0.03,blue,new THREE.Vector3(-size.x*0.09,-size.y*0.04,-size.z*0.45),-Math.PI/12);
    var rudder=mk(size.x*0.01,size.y*0.5,size.z*0.03,blue,new THREE.Vector3(0,size.y*0.2,-size.z*0.44),0);

    // Labels with lines
    addLabel(model,slatR,'SLATS',new THREE.Vector3(0,size.y*0.2,size.z*0.08));
    addLabel(model,flapR,'FLAPS',new THREE.Vector3(0,size.y*0.18,-size.z*0.06));
    addLabel(model,spoilerR,'SPOILERS',new THREE.Vector3(0,size.y*0.28,0));
    addLabel(model,aileronR,'AILERONS',new THREE.Vector3(0,size.y*0.22,0));
    addLabel(model,elevR,'ELEVATORS',new THREE.Vector3(0,size.y*0.2,0));
    addLabel(model,rudder,'RUDDER',new THREE.Vector3(0,size.y*0.4,0));
    // Left side labels
    addLabel(model,slatL,'SLATS',new THREE.Vector3(0,size.y*0.2,size.z*0.08));
    addLabel(model,flapL,'FLAPS',new THREE.Vector3(0,size.y*0.18,-size.z*0.06));
    addLabel(model,spoilerL,'SPOILERS',new THREE.Vector3(0,size.y*0.28,0));
    addLabel(model,aileronL,'AILERONS',new THREE.Vector3(0,size.y*0.22,0));

    console.log('[AR] Overlays added:', overlayMeshes.length, 'meshes,', labelSprites.length, 'labels');
  }

  function addLabel(model, target, text, offset) {
    var c = document.createElement('canvas');
    c.width=512; c.height=128;
    var ctx = c.getContext('2d');
    ctx.fillStyle='rgba(0,0,0,0.85)';
    ctx.beginPath();
    ctx.moveTo(16,0);ctx.lineTo(496,0);ctx.quadraticCurveTo(512,0,512,16);
    ctx.lineTo(512,112);ctx.quadraticCurveTo(512,128,496,128);
    ctx.lineTo(16,128);ctx.quadraticCurveTo(0,128,0,112);
    ctx.lineTo(0,16);ctx.quadraticCurveTo(0,0,16,0);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 48px system-ui';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(text,256,64);
    var tex=new THREE.CanvasTexture(c);
    var spr=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false,sizeAttenuation:false}));
    spr.scale.set(1.2,0.3,1);
    var pos=target.position.clone().add(offset);
    spr.position.copy(pos);
    spr.renderOrder=10000;
    spr.userData={isLabel:true,partKey:text};
    model.add(spr); labelSprites.push(spr);
    var geom=new THREE.BufferGeometry().setFromPoints([target.position.clone(),pos]);
    var line=new THREE.Line(geom,new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.6,depthTest:false}));
    line.renderOrder=9999; model.add(line); labelLines.push(line);
  }

  // ===== CONTROLS =====
  function setupControls() {
    var pointers={}, lastPinch=0;

    // Zoom buttons FIRST — before canvas listeners so they work independently
    function setupZoomBtn(id, factor) {
      var el = document.getElementById(id);
      var timer = null;
      function doZoom() {
        if (!activeObject) { console.log('[Zoom] no activeObject'); return; }
        var s = activeObject.scale.x * factor;
        s = Math.max(0.1, Math.min(10, s));
        activeObject.scale.set(s, s, s);
        console.log('[Zoom] scale:', s.toFixed(3));
      }
      el.addEventListener('pointerdown', function(e) {
        e.preventDefault(); e.stopPropagation();
        doZoom();
        timer = setInterval(doZoom, 80);
      }, {passive: false});
      el.addEventListener('pointerup', function(e) { e.preventDefault(); e.stopPropagation(); clearInterval(timer); timer = null; }, {passive: false});
      el.addEventListener('pointerleave', function(e) { e.stopPropagation(); clearInterval(timer); timer = null; });
      el.addEventListener('pointercancel', function(e) { e.stopPropagation(); clearInterval(timer); timer = null; });
      el.addEventListener('touchstart', function(e) { e.stopPropagation(); }, {passive: false});
      el.addEventListener('touchend', function(e) { e.stopPropagation(); }, {passive: false});
      el.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); doZoom(); }, {passive: false});
    }
    setupZoomBtn('zoomIn', 1.15);
    setupZoomBtn('zoomOut', 0.85);

    // Canvas rotation/pinch — only if event target is the canvas itself
    renderer.domElement.addEventListener('pointerdown',function(e){
      if (e.target !== renderer.domElement) return;
      pointers[e.pointerId]={x:e.clientX,y:e.clientY};
      autoRotate=false;
    });
    renderer.domElement.addEventListener('pointermove',function(e){
      if(!activeObject)return;var p=pointers[e.pointerId];if(!p)return;
      var dx=e.clientX-p.x,dy=e.clientY-p.y;pointers[e.pointerId]={x:e.clientX,y:e.clientY};
      var ids=Object.keys(pointers);
      if(ids.length===1){activeObject.rotation.y+=dx*0.005;activeObject.rotation.x+=dy*0.005;}
      else if(ids.length===2){var a=pointers[ids[0]],b=pointers[ids[1]];var d=Math.hypot(a.x-b.x,a.y-b.y);if(lastPinch){var delta=d-lastPinch;var s=Math.max(0.1,Math.min(10,activeObject.scale.x+delta*0.002));activeObject.scale.set(s,s,s);}lastPinch=d;}
    });
    renderer.domElement.addEventListener('pointerup',function(e){delete pointers[e.pointerId];if(Object.keys(pointers).length<2)lastPinch=0;if(Object.keys(pointers).length===0)setTimeout(function(){autoRotate=true},2000)});
    renderer.domElement.addEventListener('pointercancel',function(e){delete pointers[e.pointerId];if(Object.keys(pointers).length<2)lastPinch=0});

    // Mouse wheel zoom (desktop)
    renderer.domElement.addEventListener('wheel',function(e){
      if(!activeObject)return;
      e.preventDefault();
      var factor = e.deltaY > 0 ? 0.9 : 1.1;
      var s = Math.max(0.1, Math.min(10, activeObject.scale.x * factor));
      activeObject.scale.set(s,s,s);
    },{passive:false});

    createDpad('left',function(dx,dy){if(!activeObject)return;activeObject.rotation.y+=dx*0.04;activeObject.rotation.x+=dy*0.04});
    createDpad('right',function(dx,dy){if(!activeObject)return;activeObject.position.x+=dx*0.12;activeObject.position.y+=dy*0.12});

    // Label tap
    renderer.domElement.addEventListener('click',function(e){
      if(!activeObject)return;
      var rect=renderer.domElement.getBoundingClientRect();
      var closest=null,closestDist=100;
      for(var i=0;i<labelSprites.length;i++){
        var spr=labelSprites[i];if(!spr.visible)continue;
        var p=new THREE.Vector3();spr.getWorldPosition(p);p.project(camera);
        var sx=(p.x*0.5+0.5)*rect.width,sy=(-p.y*0.5+0.5)*rect.height;
        var dist=Math.hypot(e.clientX-rect.left-sx,e.clientY-rect.top-sy);
        if(dist<closestDist){closestDist=dist;closest=spr;}
      }
      if(closest)showPopup(closest.userData.partKey);
    });
  }

  function createDpad(side,callback){
    var dpad=document.createElement('div');dpad.className='dpad';
    dpad.style[side]='12px';dpad.style.bottom='12px';dpad.style[side==='left'?'right':'left']='auto';
    var grid=document.createElement('div');grid.className='dpad-grid';dpad.appendChild(grid);
    document.body.appendChild(dpad);
    var cross=document.createElement('div');
    cross.style.cssText='grid-column:1/4;grid-row:1/4;position:relative;pointer-events:none';
    cross.innerHTML='<div style="position:absolute;inset:0;background:#bab4aa;clip-path:polygon(0% 35%,35% 35%,35% 0%,65% 0%,65% 35%,100% 35%,100% 65%,65% 65%,65% 100%,35% 100%,35% 65%,0% 65%);border-radius:5px"></div><div style="position:absolute;top:4px;left:4px;right:4px;bottom:4px;background:linear-gradient(#3a4055,#202636);clip-path:polygon(0% 35%,35% 35%,35% 0%,65% 0%,65% 35%,100% 35%,100% 65%,65% 65%,65% 100%,35% 100%,35% 65%,0% 65%);border-radius:5px"></div>';
    grid.appendChild(cross);
    function btn(col,row,dx,dy){var b=document.createElement('button');b.className='dpad-btn';b.style.gridColumn=col;b.style.gridRow=row;grid.appendChild(b);var timer;b.addEventListener('pointerdown',function(){callback(dx,dy);timer=setInterval(function(){callback(dx,dy)},60)});b.addEventListener('pointerup',function(){clearInterval(timer)});b.addEventListener('pointerleave',function(){clearInterval(timer)});}
    btn('2','1',0,1);btn('2','3',0,-1);btn('1','2',-1,0);btn('3','2',1,0);
  }

  // ===== POPUP =====
  function showPopup(key){var desc=PARTS[key];if(!desc)return;document.getElementById('popupTitle').textContent=key;document.getElementById('popupBody').textContent=desc;document.getElementById('popup').style.display='block';document.getElementById('popupBg').style.display='block'}
  document.getElementById('popupClose').onclick=hidePopup;
  document.getElementById('popupBg').onclick=hidePopup;
  function hidePopup(){document.getElementById('popup').style.display='none';document.getElementById('popupBg').style.display='none'}

  // ===== MENU =====
  var menuOpen=false;
  document.getElementById('menuBtn').onclick=function(e){e.stopPropagation();menuOpen=!menuOpen;document.getElementById('menuDrop').style.display=menuOpen?'block':'none'};
  document.addEventListener('click',function(){document.getElementById('menuDrop').style.display='none';menuOpen=false});
  document.getElementById('miLabels').onclick=function(){
    labelsVisible=!labelsVisible;this.textContent=labelsVisible?'Hide Labels':'Show Labels';
    labelSprites.forEach(function(s){s.visible=labelsVisible});
    labelLines.forEach(function(l){l.visible=labelsVisible});
    overlayMeshes.forEach(function(m){m.visible=labelsVisible});
  };
  document.getElementById('miReset').onclick=function(){if(activeObject){scene.remove(activeObject);activeObject=null}loadAircraft()};

  // ===== START =====
  document.getElementById('startBtn').onclick = function(){
    document.getElementById('startOverlay').style.display='none';
    init();
    setupControls();
    loadAircraft();
  };
  </script>
</body>
</html>
