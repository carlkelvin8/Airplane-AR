<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Markerless AR Aircraft</title>
    <style>
      html, body { margin:0; height:100%; background:#000; color:#fff; font-family:system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif }
      #app { position:fixed; inset:0 }
      .overlay { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:10px 12px; background:linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,0)); z-index:1000; pointer-events:none }
      .title { font-weight:600; font-size:16px }
      .hint { font-size:12px; opacity:.9 }
      .unsupported { position:absolute; inset:0; display:none; align-items:center; justify-content:center; text-align:center; padding:24px; background:#0a0a0a }
      .unsupported.active { display:flex }
      .btn { position:fixed; bottom:12px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:#fff; padding:10px 14px; border-radius:10px; z-index:2000; cursor:pointer; pointer-events:auto }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js"
        }
      }
    </script>
    <script type="module">
      import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js';
      import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/webxr/ARButton.js';
      import { RGBELoader } from 'https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/loaders/RGBELoader.js';
      import { OBJLoader } from 'https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/loaders/OBJLoader.js';
      window.THREE = THREE;
      let DeviceOrientationControls = null;
      let OrbitControls = null;
      try {
        ({ DeviceOrientationControls } = await import('https://unpkg.com/three@0.155.0/examples/jsm/controls/DeviceOrientationControls.js'));
      } catch (e) {
        console.warn('DeviceOrientationControls import failed', e);
      }
      try {
        ({ OrbitControls } = await import('https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/controls/OrbitControls.js'));
      } catch (e) {
        console.warn('OrbitControls import failed', e);
      }
      const { GLTFLoader } = await import('https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/loaders/GLTFLoader.js');

      const overlay = document.getElementById('overlay');
      const unsupported = document.getElementById('unsupported');
      const unsupportedMsg = unsupported.querySelector('div');

      const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.setClearColor(0x000000, 0);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
      const virtualCam = new THREE.Object3D();
      scene.add(virtualCam);
      const cameraTargetPos = new THREE.Vector3(0, 0, 0);
      let followDevice = true;

      const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
      scene.add(hemi);
      const dir = new THREE.DirectionalLight(0xffffff, 0.9);
      dir.position.set(1,2,1);
      scene.add(dir);
      try {
        const pmrem = new THREE.PMREMGenerator(renderer);
        const hdr = await new RGBELoader().loadAsync('https://cdn.jsdelivr.net/gh/pmndrs/drei-assets@master/hdri/venice_sunset_1k.hdr');
        const env = pmrem.fromEquirectangular(hdr).texture;
        scene.environment = env;
        hdr.dispose();
        pmrem.dispose();
      } catch(e) { console.warn('HDR env load failed', e); }

      let xrHitTestSource = null;
      let viewerSpace = null;
      let xrRefSpace = null;
      let lastHitResult = null;
      let xrAnchorsSupported = false;
      const xrAnchors = [];
      let activeObject = null;
      const reticle = new THREE.Mesh(new THREE.RingGeometry(0.15, 0.2, 32), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
      reticle.rotation.x = -Math.PI / 2;
      reticle.visible = false;
      scene.add(reticle);

      function makeAirplane() {
        const group = new THREE.Group();
        const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0xf5f7fb, metalness: 0.6, roughness: 0.25, clearcoat: 0.6, clearcoatRoughness: 0.2 });
        const metalMat = new THREE.MeshPhysicalMaterial({ color: 0x777777, metalness: 0.9, roughness: 0.2 });
        const glassMat = new THREE.MeshPhysicalMaterial({ color: 0x99b2d4, metalness: 0, roughness: 0.05, transmission: 0.6, transparent: true });
        if (scene.environment) { bodyMat.envMap = scene.environment; metalMat.envMap = scene.environment; glassMat.envMap = scene.environment; }
        const len = 6;
        const r = 0.6;
        const pts = [
          new THREE.Vector2(0, -len*0.5),
          new THREE.Vector2(r*0.2, -len*0.45),
          new THREE.Vector2(r*0.45, -len*0.3),
          new THREE.Vector2(r*0.6, -len*0.1),
          new THREE.Vector2(r*0.65, 0),
          new THREE.Vector2(r*0.6, len*0.1),
          new THREE.Vector2(r*0.5, len*0.3),
          new THREE.Vector2(r*0.35, len*0.4),
          new THREE.Vector2(r*0.15, len*0.47),
          new THREE.Vector2(0, len*0.5)
        ];
        const fuselageGeo = new THREE.LatheGeometry(pts, 64);
        const fuselage = new THREE.Mesh(fuselageGeo, bodyMat);
        group.add(fuselage);
        const wingThickness = 0.12;
        const rootChord = 2.2;
        const tipChord = 0.9;
        const semiSpan = 5;
        const wingShape = new THREE.Shape();
        wingShape.moveTo(0, 0);
        wingShape.lineTo(semiSpan, (tipChord - rootChord) * 0.5);
        wingShape.lineTo(semiSpan, (tipChord - rootChord) * 0.5 + tipChord);
        wingShape.lineTo(0, rootChord);
        const wingExtrude = new THREE.ExtrudeGeometry(wingShape, { depth: wingThickness, bevelEnabled: false, steps: 1 });
        const wingL = new THREE.Mesh(wingExtrude, bodyMat);
        wingL.position.set(0, -0.05, 0);
        wingL.rotation.x = Math.PI / 2;
        wingL.rotation.z = Math.PI / 180 * 5;
        const wingR = wingL.clone();
        wingR.scale.x = -1;
        group.add(wingL);
        group.add(wingR);
        const engRadius = 0.35;
        const engLen = 1;
        const engineL = new THREE.Mesh(new THREE.CylinderGeometry(engRadius, engRadius, engLen, 48), metalMat);
        engineL.rotation.x = Math.PI / 2;
        engineL.position.set(-semiSpan*0.5, -0.45, 0.9);
        const engineR = engineL.clone();
        engineR.position.x = semiSpan*0.5;
        group.add(engineL);
        group.add(engineR);
        const vTailShape = new THREE.Shape();
        vTailShape.moveTo(0,0);
        vTailShape.lineTo(0.05,0.0);
        vTailShape.lineTo(0.0,0.9);
        vTailShape.lineTo(-0.25,0.85);
        const vTail = new THREE.Mesh(new THREE.ExtrudeGeometry(vTailShape, { depth: 0.08, bevelEnabled: false }), bodyMat);
        vTail.rotation.y = Math.PI / 2;
        vTail.position.set(0, 0, -len*0.4);
        group.add(vTail);
        const hStabShape = new THREE.Shape();
        hStabShape.moveTo(0,0);
        hStabShape.lineTo(1.2, -0.25);
        hStabShape.lineTo(1.2, 0.25);
        hStabShape.lineTo(0, 0.45);
        const hStabL = new THREE.Mesh(new THREE.ExtrudeGeometry(hStabShape, { depth: 0.06, bevelEnabled: false }), bodyMat);
        hStabL.rotation.x = Math.PI / 2;
        hStabL.position.set(-0.9, 0.05, -len*0.38);
        const hStabR = hStabL.clone();
        hStabR.scale.x = -1;
        group.add(hStabL);
        group.add(hStabR);
        const cockpit = new THREE.Mesh(new THREE.SphereGeometry(r*0.45, 32, 16, 0, Math.PI), glassMat);
        cockpit.rotation.y = Math.PI;
        cockpit.position.set(0, 0.1, len*0.38);
        group.add(cockpit);
        const bb = new THREE.Box3().setFromObject(group);
        const minY = bb.min.y;
        group.position.y += -minY;
        return group;
      }

      let nonXrControls = null;

      const WORLD_SPAWN_DISTANCE = 12;
      const MODEL_SCALE = 1;
      const DESIRED_LENGTH_M = 64;
      const button = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test','local-floor'],
        optionalFeatures: ['anchors','dom-overlay'],
        domOverlay: { root: document.body }
      });
      button.className = 'btn';
      button.textContent = 'Start AR';
      document.body.appendChild(button);
      button.addEventListener('click', async () => {
        console.log('[WebXR] Start AR clicked');
        try {
          // Prime permission so AR session can start smoothly
          const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
          s.getTracks().forEach(t => t.stop());
        } catch (_) {}
      });
      const startCamBtn = document.getElementById('startCam');
      let __startHandler = null;
      const fallbackBtn = document.createElement('button');
      fallbackBtn.id = 'fallbackAR';
      fallbackBtn.className = 'btn';
      fallbackBtn.style.bottom = '156px';
      fallbackBtn.textContent = 'Open AR (Scene Viewer)';
      document.body.appendChild(fallbackBtn);
      const placeBtn = document.createElement('button');
      placeBtn.id = 'placePlane';
      placeBtn.className = 'btn';
      placeBtn.style.bottom = '108px';
      placeBtn.textContent = 'Place Aircraft';
      document.body.appendChild(placeBtn);
      const load3dBtn = document.createElement('button');
      load3dBtn.id = 'load3d';
      load3dBtn.className = 'btn';
      load3dBtn.style.bottom = '252px';
      load3dBtn.textContent = 'Load 3D Aircraft';
      document.body.appendChild(load3dBtn);
      const resetBtn = document.createElement('button');
      resetBtn.id = 'resetScene';
      resetBtn.className = 'btn';
      resetBtn.style.bottom = '204px';
      resetBtn.textContent = 'Reset';
      document.body.appendChild(resetBtn);
      const zoomInBtn = document.createElement('button');
      zoomInBtn.className = 'btn';
      zoomInBtn.style.bottom = '160px';
      zoomInBtn.style.right = '20px';
      zoomInBtn.style.left = 'auto';
      zoomInBtn.style.width = '44px';
      zoomInBtn.style.height = '44px';
      zoomInBtn.style.borderRadius = '22px';
      zoomInBtn.textContent = '+';
      document.body.appendChild(zoomInBtn);
      const zoomOutBtn = document.createElement('button');
      zoomOutBtn.className = 'btn';
      zoomOutBtn.style.bottom = '100px';
      zoomOutBtn.style.right = '20px';
      zoomOutBtn.style.left = 'auto';
      zoomOutBtn.style.width = '44px';
      zoomOutBtn.style.height = '44px';
      zoomOutBtn.style.borderRadius = '22px';
      zoomOutBtn.textContent = '-';
      document.body.appendChild(zoomOutBtn);
      const moveUpBtn = document.createElement('button');
      moveUpBtn.className = 'btn';
      moveUpBtn.style.bottom = '396px';
      moveUpBtn.textContent = 'Move Up';
      document.body.appendChild(moveUpBtn);
      const moveDownBtn = document.createElement('button');
      moveDownBtn.className = 'btn';
      moveDownBtn.style.bottom = '444px';
      moveDownBtn.textContent = 'Move Down';
      document.body.appendChild(moveDownBtn);
      const tiltUpBtn = document.createElement('button');
      tiltUpBtn.className = 'btn';
      tiltUpBtn.style.bottom = '492px';
      tiltUpBtn.textContent = 'Tilt Up';
      document.body.appendChild(tiltUpBtn);
      const tiltDownBtn = document.createElement('button');
      tiltDownBtn.className = 'btn';
      tiltDownBtn.style.bottom = '540px';
      tiltDownBtn.textContent = 'Tilt Down';
      document.body.appendChild(tiltDownBtn);
      function hideLegacyButtons() {
        try {
          [load3dBtn, resetBtn, placeBtn, fallbackBtn, startCamBtn, moveUpBtn, moveDownBtn, tiltUpBtn, tiltDownBtn].forEach(b => {
            if (b) b.style.display = 'none';
          });
        } catch (_) {}
      }
      hideLegacyButtons();
      let anchorBase = null;
      function adjustScale(factor) {
        const o = activeObject;
        if (!o) return;
        const s = Math.max(0.05, Math.min(10, o.scale.x * factor));
        o.scale.set(s, s, s);
      }
      zoomInBtn.addEventListener('click', () => adjustScale(1.1));
      zoomOutBtn.addEventListener('click', () => adjustScale(0.9));
      function adjustHeight(delta) { if (!activeObject) return; activeObject.position.y += delta; }
      function adjustPitch(delta) { if (!activeObject) return; activeObject.rotation.x += delta; }
      moveUpBtn.addEventListener('click', () => adjustHeight(0.5));
      moveDownBtn.addEventListener('click', () => adjustHeight(-0.5));
      tiltUpBtn.addEventListener('click', () => adjustPitch(0.05));
      tiltDownBtn.addEventListener('click', () => adjustPitch(-0.05));
      const joy = document.createElement('div');
      joy.style.position = 'fixed';
      joy.style.left = '16px';
      joy.style.bottom = '16px';
      joy.style.width = '160px';
      joy.style.height = '160px';
      joy.style.borderRadius = '80px';
      joy.style.background = 'rgba(255,255,255,0.08)';
      joy.style.border = '1px solid rgba(255,255,255,0.25)';
      joy.style.zIndex = '2000';
      joy.style.touchAction = 'none';
      const knob = document.createElement('div');
      knob.style.position = 'absolute';
      knob.style.left = '50%';
      knob.style.top = '50%';
      knob.style.width = '56px';
      knob.style.height = '56px';
      knob.style.marginLeft = '-28px';
      knob.style.marginTop = '-28px';
      knob.style.borderRadius = '28px';
      knob.style.background = 'rgba(255,255,255,0.2)';
      knob.style.border = '1px solid rgba(255,255,255,0.35)';
      joy.appendChild(knob);
      document.body.appendChild(joy);
      let dragging = false;
      let center = { x: 80, y: 80 };
      function applyControl(dx, dy) {
        if (!activeObject) return;
        activeObject.rotation.y += dx * 0.004;
        activeObject.rotation.x += -dy * 0.004;
      }
      joy.addEventListener('pointerdown', (e) => { dragging = true; joy.setPointerCapture(e.pointerId); });
      joy.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        const rect = joy.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const dx = x - center.x;
        const dy = y - center.y;
        const mag = Math.hypot(dx, dy);
        const max = 60;
        const nx = mag > max ? dx * (max / mag) : dx;
        const ny = mag > max ? dy * (max / mag) : dy;
        knob.style.transform = `translate(${nx}px, ${ny}px)`;
        applyControl(nx, ny);
      });
      joy.addEventListener('pointerup', () => { dragging = false; knob.style.transform = 'translate(0,0)'; });
      const joyR = document.createElement('div');
      joyR.style.position = 'fixed';
      joyR.style.right = '80px';
      joyR.style.bottom = '16px';
      joyR.style.width = '160px';
      joyR.style.height = '160px';
      joyR.style.borderRadius = '80px';
      joyR.style.background = 'rgba(255,255,255,0.08)';
      joyR.style.border = '1px solid rgba(255,255,255,0.25)';
      joyR.style.zIndex = '2000';
      joyR.style.touchAction = 'none';
      const knobR = document.createElement('div');
      knobR.style.position = 'absolute';
      knobR.style.left = '50%';
      knobR.style.top = '50%';
      knobR.style.width = '56px';
      knobR.style.height = '56px';
      knobR.style.marginLeft = '-28px';
      knobR.style.marginTop = '-28px';
      knobR.style.borderRadius = '28px';
      knobR.style.background = 'rgba(255,255,255,0.2)';
      knobR.style.border = '1px solid rgba(255,255,255,0.35)';
      joyR.appendChild(knobR);
      document.body.appendChild(joyR);
      let draggingR = false;
      const centerR = { x: 80, y: 80 };
      function applyControlR(dx, dy) {
        if (!activeObject) return;
        const px = activeObject.position.x + dx * 0.02;
        const py = activeObject.position.y + -dy * 0.02;
        if (!anchorBase) anchorBase = activeObject.position.clone();
        const limitX = 30, limitY = 30;
        activeObject.position.x = Math.max(anchorBase.x - limitX, Math.min(anchorBase.x + limitX, px));
        activeObject.position.y = Math.max(anchorBase.y - limitY, Math.min(anchorBase.y + limitY, py));
      }
      joyR.addEventListener('pointerdown', (e) => { draggingR = true; joyR.setPointerCapture(e.pointerId); });
      joyR.addEventListener('pointermove', (e) => {
        if (!draggingR) return;
        const rect = joyR.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const dx = x - centerR.x;
        const dy = y - centerR.y;
        const mag = Math.hypot(dx, dy);
        const max = 40;
        const nx = mag > max ? dx * (max / mag) : dx;
        const ny = mag > max ? dy * (max / mag) : dy;
        knobR.style.transform = `translate(${nx}px, ${ny}px)`;
        applyControlR(nx, ny);
      });
      joyR.addEventListener('pointerup', () => { draggingR = false; knobR.style.transform = 'translate(0,0)'; });
      joy.style.display = 'block';
      joyR.style.display = 'none';
      const dpad = document.createElement('div');
      dpad.style.position = 'fixed';
      dpad.style.right = '16px';
      dpad.style.bottom = '16px';
      dpad.style.width = '160px';
      dpad.style.height = '160px';
      dpad.style.zIndex = '2000';
      document.body.appendChild(dpad);
      function makeArrow(label) {
        const b = document.createElement('button');
        b.className = 'btn';
        b.textContent = label;
        b.style.position = 'absolute';
        b.style.width = '60px';
        b.style.height = '60px';
        b.style.borderRadius = '12px';
        b.style.opacity = '0.9';
        return b;
      }
      const upBtn = makeArrow('▲');
      const downBtn = makeArrow('▼');
      const leftBtn = makeArrow('◀');
      const rightBtn = makeArrow('▶');
      upBtn.style.left = '50%'; upBtn.style.transform = 'translateX(-50%)'; upBtn.style.top = '0';
      downBtn.style.left = '50%'; downBtn.style.transform = 'translateX(-50%)'; downBtn.style.bottom = '0';
      leftBtn.style.top = '50%'; leftBtn.style.transform = 'translateY(-50%)'; leftBtn.style.left = '0';
      rightBtn.style.top = '50%'; rightBtn.style.transform = 'translateY(-50%)'; rightBtn.style.right = '0';
      dpad.appendChild(upBtn); dpad.appendChild(downBtn); dpad.appendChild(leftBtn); dpad.appendChild(rightBtn);
      let holdTimer = null;
      function moveActive(dx, dy) {
        if (!activeObject) return;
        const step = 0.15;
        const px = activeObject.position.x + dx * step;
        const py = activeObject.position.y + dy * step;
        if (!anchorBase) anchorBase = activeObject.position.clone();
        const limitX = 30, limitY = 30;
        activeObject.position.x = Math.max(anchorBase.x - limitX, Math.min(anchorBase.x + limitX, px));
        activeObject.position.y = Math.max(anchorBase.y - limitY, Math.min(anchorBase.y + limitY, py));
      }
      function onHold(fn) { fn(); holdTimer = setInterval(fn, 60); }
      function endHold() { if (holdTimer) { clearInterval(holdTimer); holdTimer = null; } }
      upBtn.addEventListener('pointerdown', () => onHold(() => moveActive(0, 1)));
      downBtn.addEventListener('pointerdown', () => onHold(() => moveActive(0, -1)));
      leftBtn.addEventListener('pointerdown', () => onHold(() => moveActive(-1, 0)));
      rightBtn.addEventListener('pointerdown', () => onHold(() => moveActive(1, 0)));
      [upBtn,downBtn,leftBtn,rightBtn].forEach(b => {
        b.addEventListener('pointerup', endHold);
        b.addEventListener('pointerleave', endHold);
        b.addEventListener('pointercancel', endHold);
      });
      const menuBtn = document.createElement('button');
      menuBtn.className = 'btn';
      menuBtn.style.position = 'fixed';
      menuBtn.style.top = '16px';
      menuBtn.style.right = '16px';
      menuBtn.style.transform = 'none';
      menuBtn.style.width = '44px';
      menuBtn.style.height = '44px';
      menuBtn.style.borderRadius = '22px';
      menuBtn.style.padding = '0';
      menuBtn.style.display = 'grid';
      menuBtn.style.placeItems = 'center';
      menuBtn.textContent = '';
      const bars = document.createElement('div');
      bars.style.width = '22px';
      bars.style.height = '16px';
      bars.style.display = 'grid';
      bars.style.gridTemplateRows = 'repeat(3, 1fr)';
      bars.style.gap = '3px';
      function makeBar() {
        const d = document.createElement('div');
        d.style.height = '2px';
        d.style.background = 'rgba(255,255,255,0.9)';
        d.style.borderRadius = '2px';
        return d;
      }
      bars.appendChild(makeBar());
      bars.appendChild(makeBar());
      bars.appendChild(makeBar());
      menuBtn.appendChild(bars);
      menuBtn.style.zIndex = '2100';
      document.body.appendChild(menuBtn);
      const menu = document.createElement('div');
      menu.style.position = 'fixed';
      menu.style.top = '64px';
      menu.style.right = '16px';
      menu.style.background = 'rgba(20,20,20,0.9)';
      menu.style.border = '1px solid rgba(255,255,255,0.25)';
      menu.style.borderRadius = '10px';
      menu.style.padding = '6px';
      menu.style.display = 'none';
      menu.style.zIndex = '2100';
      function addMenuItem(title, handler){
        const b = document.createElement('div');
        b.textContent = title;
        b.style.padding = '8px 10px';
        b.style.cursor = 'pointer';
        b.style.borderRadius = '6px';
        b.addEventListener('click', () => { handler(); menu.style.display = 'none'; });
        b.addEventListener('mouseenter', () => b.style.background = 'rgba(255,255,255,0.08)');
        b.addEventListener('mouseleave', () => b.style.background = 'transparent');
        menu.appendChild(b);
      }
      addMenuItem('Load 3D Aircraft', () => load3dAircraft());
      addMenuItem('Reset', () => resetBtn.click());
      addMenuItem('Start Camera', () => __startHandler && __startHandler());
      addMenuItem('Toggle Device Follow', () => { 
        followDevice = !followDevice; 
        leftAnalogMode = followDevice ? true : leftAnalogMode;
        if (typeof joy !== 'undefined' && typeof dpadL !== 'undefined') {
          joy.style.display = leftAnalogMode ? 'block' : 'none';
          dpadL.style.display = leftAnalogMode ? 'none' : 'block';
        }
        layoutControls();
      });
      document.body.appendChild(menu);
      menuBtn.addEventListener('click', () => {
        menu.style.display = (menu.style.display === 'none' ? 'block' : 'none');
      });
      function layoutControls() {
        const vw = window.innerWidth, vh = window.innerHeight;
        const isPortrait = vh >= vw;
        const base = Math.min(vw, vh);
        const size = Math.max(96, Math.min(180, Math.floor(base * (isPortrait ? 0.36 : 0.28))));
        const safeBottom = 16;
        joy.style.width = size + 'px';
        joy.style.height = size + 'px';
        joy.style.borderRadius = Math.round(size/2) + 'px';
        joy.style.left = '16px';
        joy.style.bottom = safeBottom + 'px';

        const pointers = new Map();

          var fuselage = new THREE.Mesh(new THREE.LatheGeometry(pts, 64), bodyMat);
          group.add(fuselage);
          var wingThickness = 0.12;
          var rootChord = 2.2;
          var tipChord = 0.9;
          var semiSpan = 5;
          var wingShape = new THREE.Shape();
          wingShape.moveTo(0, 0);
          wingShape.lineTo(semiSpan, (tipChord - rootChord) * 0.5);
          wingShape.lineTo(semiSpan, (tipChord - rootChord) * 0.5 + tipChord);
          wingShape.lineTo(0, rootChord);
          var wingExtrude = new THREE.ExtrudeGeometry(wingShape, { depth: wingThickness, bevelEnabled: false, steps: 1 });
          var wingL = new THREE.Mesh(wingExtrude, bodyMat);
          wingL.position.set(0, -0.05, 0);
          wingL.rotation.x = Math.PI / 2;
          wingL.rotation.z = Math.PI / 180 * 5;
          var wingR = wingL.clone();
          wingR.scale.x = -1;
          group.add(wingL);
          group.add(wingR);
          var engineL = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1, 48), metalMat);
          engineL.rotation.x = Math.PI / 2;
          engineL.position.set(-semiSpan*0.5, -0.45, 0.9);
          var engineR = engineL.clone();
          engineR.position.x = semiSpan*0.5;
          group.add(engineL);
          group.add(engineR);
          var vTailShape = new THREE.Shape();
          vTailShape.moveTo(0,0);
          vTailShape.lineTo(0.05,0.0);
          vTailShape.lineTo(0.0,0.9);
          vTailShape.lineTo(-0.25,0.85);
          var vTail = new THREE.Mesh(new THREE.ExtrudeGeometry(vTailShape, { depth: 0.08, bevelEnabled: false }), bodyMat);
          vTail.rotation.y = Math.PI / 2;
          vTail.position.set(0, 0, -len*0.4);
          group.add(vTail);
          var hStabShape = new THREE.Shape();
          hStabShape.moveTo(0,0);
          hStabShape.lineTo(1.2, -0.25);
          hStabShape.lineTo(1.2, 0.25);
          hStabShape.lineTo(0, 0.45);
          var hStabL = new THREE.Mesh(new THREE.ExtrudeGeometry(hStabShape, { depth: 0.06, bevelEnabled: false }), bodyMat);
          hStabL.rotation.x = Math.PI / 2;
          hStabL.position.set(-0.9, 0.05, -len*0.38);
          var hStabR = hStabL.clone();
          hStabR.scale.x = -1;
          group.add(hStabL);
          group.add(hStabR);
          var cockpit = new THREE.Mesh(new THREE.SphereGeometry(r*0.45, 32, 16, 0, Math.PI), glassMat);
          cockpit.rotation.y = Math.PI;
          cockpit.position.set(0, 0.1, len*0.38);
          group.add(cockpit);
          var bb = new THREE.Box3().setFromObject(group);
          var minY = bb.min.y;
          group.position.y += -minY;
          return group;
        }
        var placed = [];
        var placeCount = 0;
        var lastPlacedSimple = null;
        var nonXrControls = null;
        function createButton(id, text, bottom) {
          var b = document.getElementById(id);
          if (b) return b;
          b = document.createElement('button');
          b.id = id;
          b.className = 'btn';
          b.style.bottom = bottom;
          b.textContent = text;
          document.body.appendChild(b);
          return b;
        }
        var placeBtn = createButton('placePlane', 'Place Aircraft', '108px');
        var load3dBtn = createButton('load3d', 'Load 3D Aircraft', '252px');
        var resetBtn = createButton('resetScene', 'Reset', '204px');
        var zoomInBtn = createButton('zoomIn', 'Zoom In', '348px');
        var zoomOutBtn = createButton('zoomOut', 'Zoom Out', '300px');
        var moveUpBtn = createButton('moveUp', 'Move Up', '396px');
        var moveDownBtn = createButton('moveDown', 'Move Down', '444px');
        var tiltUpBtn = createButton('tiltUp', 'Tilt Up', '492px');
        var tiltDownBtn = createButton('tiltDown', 'Tilt Down', '540px');
        var anchorBase = null;
        function adjustScale(f){ var o = window.__activeObject; if (!o) return; var s = Math.max(0.5, Math.min(4, o.scale.x * f)); o.scale.set(s,s,s) }
        zoomInBtn.addEventListener('click', function(){ adjustScale(1.1) });
        zoomOutBtn.addEventListener('click', function(){ adjustScale(0.9) });
        function adjustHeight(d){ var o = window.__activeObject; if (!o) return; o.position.y += d }
        function adjustPitch(d){ var o = window.__activeObject; if (!o) return; o.rotation.x += d }
        moveUpBtn.addEventListener('click', function(){ adjustHeight(0.5) });
        moveDownBtn.addEventListener('click', function(){ adjustHeight(-0.5) });
        tiltUpBtn.addEventListener('click', function(){ adjustPitch(0.05) });
        tiltDownBtn.addEventListener('click', function(){ adjustPitch(-0.05) });
        var joy = document.getElementById('joy');
        if (!joy) {
          joy = document.createElement('div');
          joy.id = 'joy';
          joy.style.position = 'fixed';
          joy.style.left = '16px';
          joy.style.bottom = '16px';
          joy.style.width = '120px';
          joy.style.height = '120px';
          joy.style.borderRadius = '60px';
          joy.style.background = 'rgba(255,255,255,0.08)';
          joy.style.border = '1px solid rgba(255,255,255,0.25)';
          joy.style.zIndex = '2000';
          joy.style.touchAction = 'none';
          var knob = document.createElement('div');
          knob.id = 'joyKnob';
          knob.style.position = 'absolute';
          knob.style.left = '50%';
          knob.style.top = '50%';
          knob.style.width = '48px';
          knob.style.height = '48px';
          knob.style.marginLeft = '-24px';
          knob.style.marginTop = '-24px';
          knob.style.borderRadius = '24px';
          knob.style.background = 'rgba(255,255,255,0.2)';
          knob.style.border = '1px solid rgba(255,255,255,0.35)';
          joy.appendChild(knob);
          document.body.appendChild(joy);
          var dragging = false;
          var center = { x:60, y:60 };
          function applyControl(dx,dy){
            var o = window.__activeObject; if (!o) return;
            o.rotation.y += dx * 0.005;
            var px = o.position.x + dx * 0.01;
            var pz = o.position.z + -dy * 0.01;
            if (!anchorBase) anchorBase = o.position.clone();
            var offX = px - anchorBase.x;
            var offZ = pz - anchorBase.z;
            var r = Math.sqrt(offX*offX + offZ*offZ);
            var limit = 10;
            if (r > limit) {
              var k = limit / r;
              o.position.x = anchorBase.x + offX * k;
              o.position.z = anchorBase.z + offZ * k;
            } else {
              o.position.x = px;
              o.position.z = pz;
            }
          }
          joy.addEventListener('pointerdown', function(e){ dragging = true; joy.setPointerCapture(e.pointerId) });
          joy.addEventListener('pointermove', function(e){
            if (!dragging) return;
            var rect = joy.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;
            var dx = x - center.x;
            var dy = y - center.y;
            var mag = Math.hypot(dx,dy);
            var max = 40;
            var nx = mag > max ? dx * (max / mag) : dx;
            var ny = mag > max ? dy * (max / mag) : dy;
            knob.style.transform = 'translate('+nx+'px,'+ny+'px)';
            applyControl(nx, ny);
          });
          joy.addEventListener('pointerup', function(){ dragging = false; knob.style.transform = 'translate(0,0)' });
        }
        function place() {
          var obj = makeAirplane();
          if (!nonXrControls && THREE.DeviceOrientationControls) {
            nonXrControls = new THREE.DeviceOrientationControls(camera);
            nonXrControls.connect();
          }
          renderer.domElement.style.position = 'fixed';
          renderer.domElement.style.inset = '0';
          renderer.domElement.style.zIndex = '2';
          var dist = 15;
          obj.position.set(0, 0, -dist);
          obj.rotation.y = Math.random() * Math.PI * 2;
          scene.add(obj);
          placed.push(obj);
          lastPlacedSimple = obj;
          window.__activeObject = obj;
          anchorBase = obj.position.clone();
          placeCount++;
        }
        placeBtn.addEventListener('click', place);
        function makeLabel(text, color) {
          var canvas = document.createElement('canvas');
          canvas.width = 256; canvas.height = 64;
          var ctx = canvas.getContext('2d');
          ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,256,64);
          ctx.fillStyle = color || '#ffffff';
          ctx.font = '28px sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(text, 128, 32);
          var tex = new THREE.CanvasTexture(canvas);
          var mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
          var spr = new THREE.Sprite(mat);
          spr.scale.set(0.8, 0.2, 1);
          return spr;
        }
        function load3d() {
          try {
            var objUrl = 'https://assets.codepen.io/557388/1405+Plane_1.obj';
            var loader = new THREE.OBJLoader();
            var model = null;
            fetch(objUrl, { mode: 'cors' })
              .then(function(resp){ return resp.text() })
              .then(function(text){
                model = loader.parse(text);
                model.traverse(function(o){ if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; o.material = new THREE.MeshPhongMaterial({ color: 0x171511, specular: 0xD0CBC7, shininess: 5, flatShading: true }); } });
                model.scale.set(1,1,1);
              var root = new THREE.Group();
              var box = new THREE.Box3().setFromObject(model);
              var minY = box.min.y;
              model.position.y += -minY;
              root.add(model);
              var sized = new THREE.Box3().setFromObject(root);
              var size = new THREE.Vector3(); sized.getSize(size);
              var currentLen = Math.max(size.x, size.y, size.z);
              var factor = 64 / (currentLen || 1);
              root.scale.set(factor, factor, factor);
              if (lastPlacedSimple) {
                root.position.copy(lastPlacedSimple.position);
                root.rotation.copy(lastPlacedSimple.rotation);
                scene.remove(lastPlacedSimple);
                placed.splice(placed.indexOf(lastPlacedSimple), 1);
                lastPlacedSimple = null;
              } else {
                renderer.domElement.style.position = 'fixed';
                renderer.domElement.style.inset = '0';
                renderer.domElement.style.zIndex = '2';
                if (!nonXrControls && THREE.DeviceOrientationControls) { nonXrControls = new THREE.DeviceOrientationControls(camera); nonXrControls.connect(); }
                root.position.set(0,0,-15);
              }
              var box = new THREE.Box3().setFromObject(model);
              var size = new THREE.Vector3(); box.getSize(size);
              var center = new THREE.Vector3(); box.getCenter(center);
              [
                { t:'Ailerons', c:'#ff6b6b', o:new THREE.Vector3(size.x*0.2, size.y*0.15, size.z*0.45) },
                { t:'Flaps', c:'#ffd166', o:new THREE.Vector3(-size.x*0.05, size.y*0.1, size.z*0.30) },
                { t:'Spoilers', c:'#ffa500', o:new THREE.Vector3(0, size.y*0.2, 0) },
                { t:'Slats', c:'#d7dce3', o:new THREE.Vector3(size.x*0.25, size.y*0.05, size.z*0.15) },
                { t:'Elevators', c:'#00a3ff', o:new THREE.Vector3(-size.x*0.35, size.y*0.15, -size.z*0.35) },
                { t:'Rudder', c:'#59d97a', o:new THREE.Vector3(-size.x*0.38, size.y*0.35, -size.z*0.38) },
              ].forEach(function(x){
                var spr = makeLabel(x.t, x.c);
                spr.position.copy(center.clone().add(x.o));
                model.add(spr);
              });
              scene.add(root);
              placed.push(root);
              window.__activeObject = root;
            }).catch(function(e){
              try {
                loader.load(objUrl, function(obj){
                  model = obj;
                  model.traverse(function(o){ if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; o.material = new THREE.MeshPhongMaterial({ color: 0x171511, specular: 0xD0CBC7, shininess: 5, flatShading: true }); } });
                  model.scale.set(1,1,1);
                  var root = new THREE.Group();
                  var box = new THREE.Box3().setFromObject(model);
                  var minY = box.min.y;
                  model.position.y += -minY;
                  root.add(model);
                  var sized = new THREE.Box3().setFromObject(root);
                  var size = new THREE.Vector3(); sized.getSize(size);
                  var currentLen = Math.max(size.x, size.y, size.z);
                  var factor = 64 / (currentLen || 1);
                  root.scale.set(factor, factor, factor);
                  scene.add(root);
                  placed.push(root);
                  window.__activeObject = root;
                }, function(){}, function(){ place(); });
              } catch(_){ place(); }
            });
          } catch(e) { place(); }
        }
        load3dBtn.addEventListener('click', load3d);
        resetBtn.addEventListener('click', function(){
          placed.forEach(function(o){ scene.remove(o) });
          placed.length = 0;
          placeCount = 0;
        });
        window.addEventListener('resize', function(){
          renderer.setSize(window.innerWidth, window.innerHeight);
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
        });
        function loop(){
          if (nonXrControls) nonXrControls.update();
          renderer.render(scene, camera);
          requestAnimationFrame(loop);
        }
        loop();
        window.__autoPlaceAfterCamera = window.__autoPlaceAfterCamera || function(){ try{ load3d() }catch(e){} };
        setTimeout(function(){ try{ load3d() }catch(e){} }, 200);
        (function addGesture(){
          var pointers = {};
          var lastPinch = 0;
          window.addEventListener('pointerdown', function(e){ pointers[e.pointerId] = { x:e.clientX, y:e.clientY } });
          window.addEventListener('pointermove', function(e){
            var obj = window.__activeObject;
            if (!obj) return;
            var p = pointers[e.pointerId];
            if (!p) return;
            var dx = e.clientX - p.x;
            var dy = e.clientY - p.y;
            pointers[e.pointerId] = { x:e.clientX, y:e.clientY };
            var ids = Object.keys(pointers);
            if (ids.length === 1) {
              obj.rotation.y += dx * 0.005;
            } else if (ids.length === 2) {
              var a = pointers[ids[0]], b = pointers[ids[1]];
              var d = Math.hypot(a.x - b.x, a.y - b.y);
              if (lastPinch) {
                var delta = d - lastPinch;
                var s = Math.max(0.5, Math.min(4, obj.scale.x + delta * 0.002));
                obj.scale.set(s, s, s);
              }
              lastPinch = d;
            }
          });
          function end(e){ delete pointers[e.pointerId]; var ids = Object.keys(pointers); if (ids.length < 2) lastPinch = 0; }
          window.addEventListener('pointerup', end);
          window.addEventListener('pointercancel', end);
        })();
      })();
    </script>
